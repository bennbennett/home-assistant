# Living Room
- name: Living Room
  lights:
    - light.living_room
    - light.living_room_color
  transition: 120
  initial_transition: 1
  sleep_transition: 30
  only_once: true  # Don't override manual brightness changes
  min_color_temp: 2700
  max_color_temp: 5500

# Kitchen
- name: Kitchen
  lights:
