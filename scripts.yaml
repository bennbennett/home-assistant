good_morning_sequence:
  alias: "Good Morning Sequence"
  sequence:
    # First turn on the lights at minimum brightness
    - service: light.turn_on
      target:
        entity_id: light.front_house
      data:
        brightness_pct: 1
        transition: 1
    
    # Add a small delay to ensure lights are on
    - delay:
        seconds: 2
        
    # Step up to 10% first for more gradual control
    - service: light.turn_on
      target:
        entity_id: light.front_house
      data:
        brightness_pct: 10
        transition: 3
        
    # Small delay before next transition
    - delay:
        seconds: 1
        
    # Now transition to 30% over 8 seconds
    - service: light.turn_on
      target:
        entity_id: light.front_house
      data:
        brightness_pct: 30
        transition: 8
    
    # Add a small delay to ensure initial brightness is set
    - delay:
        seconds: 5

    # Turn on adaptive lighting for the living room and kitchen
    - service: switch.turn_on
      target:
        entity_id:
          - switch.adaptive_lighting_living_room
          - switch.adaptive_lighting_kitchen

    # Add a delay for adaptive lighting to take effect
    - delay:
        seconds: 10
        
    # Gradually transition front house lights to 50% over 5 minutes
    - service: light.turn_on
      target:
        entity_id: light.front_house
      data:
        brightness_pct: 50
        transition: 300

good_night_sequence:
  alias: "Good Night Sequence"
  sequence:
    - service: light.turn_off
      target:
        entity_id:
          - light.living_room_color
          - light.bedroom
          - light.kitchen_table
          - light.kitchen
          - light.outdoor_plug
          - light.front_house
          - light.bedrooms
          - light.master_bedroom
          - light.toby_s_room
          - light.dining_kitchen_zone
      data:
        transition: 180  # 3 minutes in seconds

set_mobile_dashboard:
  alias: Set Mobile Dashboard as Default
  description: Sets the mobile dashboard as the default for the current device
  sequence:
    - service: browser_mod.navigate
      data:
        navigation_path: /mobile-dashboard
    - service: persistent_notification.create
      data:
        title: Mobile Dashboard Set
        message: "This device will now use the mobile-optimized dashboard. You can bookmark this URL or add it to your home screen for easy access."

sunset_gradual_lighting_script:
  alias: "Sunset Gradual Lighting Script"
  description: "Applies adaptive lighting for sunset, but only if lights are off" # Updated description
  sequence:
    - choose:
        # OPTION 1: Lights are off - full adaptive lighting
        - conditions:
            - condition: template
              value_template: >-
                {% set current_state = states('light.front_house') %}
                {% if current_state == 'off' %}
                  true
                {% else %}
                  false
                {% endif %}
          sequence:
            # Normal sunset routine for lights that are off
            - service: light.turn_on
              target:
                entity_id: light.front_house
              data:
                brightness_pct: 1  # Start with minimal brightness
                transition: 1  # Quick initial transition
            
            - delay:
                seconds: 5  # Brief pause
            
            - service: adaptive_lighting.apply
              data:
                entity_id: switch.adaptive_lighting_living_room
                lights:
                  - light.front_house
                adapt_brightness: true
                adapt_color: true
                transition: 1800  # 30 minutes
                turn_on_lights: true

create_calendar_event:
  alias: "Create Calendar Event"
  description: "Creates a new calendar event based on form input"
  sequence:
    # Determine which calendar entity to use
    - variables:
        calendar_entity: >
          {% if states('input_select.calendar_selector') == 'Home Calendar' %}
            calendar.home_calendar
          {% elif states('input_select.calendar_selector') == 'Birthdays & Anniversaries' %}
            calendar.birthdays_anniversaries
          {% else %}
            calendar.home_calendar
          {% endif %}

    # Create the calendar event (timed event)
    - service: calendar.create_event
      target:
        entity_id: "{{ calendar_entity }}"
      data:
        summary: "{{ states('input_text.event_title') }}"
        description: "{{ states('input_text.event_description') }}"
        location: "{{ states('input_text.event_location') }}"
        start_date_time: "{{ states('input_datetime.event_start') }}"
        end_date_time: "{{ states('input_datetime.event_end') }}"
    
    # Show success notification
    - service: persistent_notification.create
      data:
        title: "Calendar Event Created"
        message: "Event '{{ states('input_text.event_title') }}' has been added to the calendar."
        
    # Navigate back to calendar view
    - service: browser_mod.navigate
      data:
        navigation_path: "/tablet-dashboard/calendar"
        
    # Reset the form fields
    - service: input_text.set_value
      target:
        entity_id: input_text.event_title
      data:
        value: ""
    - service: input_text.set_value
      target:
        entity_id: input_text.event_location
      data:
        value: ""
    - service: input_text.set_value
      target:
        entity_id: input_text.event_description
      data:
        value: ""

create_calendar_popup_event:
  alias: "Create Calendar Event (Popup)"
  description: "Creates a new calendar event from popup data and closes the popup"
  sequence:
    # Determine which calendar entity to use
    - variables:
        calendar_entity: >
          {% if states('input_select.calendar_selector') == 'Home Calendar' %}
            calendar.home_calendar
          {% elif states('input_select.calendar_selector') == 'Birthdays & Anniversaries' %}
            calendar.birthdays_anniversaries
          {% else %}
            calendar.home_calendar
          {% endif %}

    # Create the calendar event
    - choose:
        # All-day event: use date-only fields
        - conditions:
            - condition: state
              entity_id: input_boolean.event_all_day
              state: 'on'
          sequence:
            - service: calendar.create_event
              target:
                entity_id: "{{ calendar_entity }}"
              data:
                summary: "{{ states('input_text.event_title') }}"
                description: "{{ states('input_text.event_description') }}"
                location: "{{ states('input_text.event_location') }}"
                start_date: "{{ state_attr('input_datetime.event_start','timestamp') | timestamp_custom('%Y-%m-%d') }}"
                end_date: "{{ (state_attr('input_datetime.event_start','timestamp') + 86400) | timestamp_custom('%Y-%m-%d') }}"
        # Timed event: default 1 hour unless explicit end time is set
        - conditions:
            - condition: state
              entity_id: input_boolean.event_all_day
              state: 'off'
          sequence:
            - service: calendar.create_event
              target:
                entity_id: "{{ calendar_entity }}"
              data:
                summary: "{{ states('input_text.event_title') }}"
                description: "{{ states('input_text.event_description') }}"
                location: "{{ states('input_text.event_location') }}"
                start_date_time: "{{ states('input_datetime.event_start') }}"
                end_date_time: >
                  {% if is_state('input_boolean.event_set_end_time','on') %}
                    {{ states('input_datetime.event_end') }}
                  {% else %}
                    {% set ts = state_attr('input_datetime.event_start','timestamp') %}
                    {{ (ts + 3600) | timestamp_custom('%Y-%m-%d %H:%M:%S') }}
                  {% endif %}

    # Reset the form fields
    - service: input_text.set_value
      target:
        entity_id: input_text.event_title
      data:
        value: ""
    - service: input_text.set_value
      target:
        entity_id: input_text.event_location
      data:
        value: ""
    - service: input_text.set_value
      target:
        entity_id: input_text.event_description
      data:
        value: ""

create_calendar_popup_event_and_close:
  alias: "Create Calendar Event and Close Popup"
  description: "Creates event, triggers helper to close popup"
  mode: single
  sequence:
    # Turn on helper to trigger automation
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.calendar_event_created

    # Create the event
    - service: script.create_calendar_popup_event
      data: {}
      
open_calendar_event_popup:
  alias: "Open Calendar Event Popup"
  description: "Opens the calendar event creation popup"
  sequence:
    # Set default values for the form
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.event_start
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:00:00') }}"
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.event_end
      data:
        datetime: "{{ (now() + timedelta(hours=1)).strftime('%Y-%m-%d %H:00:00') }}"
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.event_all_day
    - service: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.event_set_end_time
          - input_boolean.event_show_location
          - input_boolean.event_show_description
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.event_set_end_time
    
    # Clear previous values
    - service: input_text.set_value
      target:
        entity_id: input_text.event_title
      data:
        value: ""
    - service: input_text.set_value
      target:
        entity_id: input_text.event_location
      data:
        value: ""
    - service: input_text.set_value
      target:
        entity_id: input_text.event_description
      data:
        value: ""
    
    # Open the popup
    - service: browser_mod.popup
      data:
        title: Add Calendar Event
        size: normal
        style:
          $: |
            .mdc-dialog .mdc-dialog__surface {
              width: 50vw;
              max-width: 50vw;
            }
        content: !include dashboards/popups/calendar_event_popup_home_hub.yaml

assign_meal_to_day:
  alias: "Assign Meal to Day"
  description: "Assigns the selected recipe to the selected day via Mealie"
  sequence:
    - variables:
        selected_day: "{{ states('input_select.meal_day_selector') }}"
        selected_recipe: "{{ states('input_select.recipe_selector') }}"
        recipes: "{{ state_attr('sensor.mealie_recipe_browser', 'items') | default([]) }}"
        # Look up recipe ID dynamically from sensor data
        recipe_id: "{{ (recipes | selectattr('name', 'eq', selected_recipe) | map(attribute='recipe_id') | list | first) | default('') }}"
        # Calculate date from day name (Python weekday: Mon=0 ... Sun=6)
        days_map:
          "Monday": 0
          "Tuesday": 1
          "Wednesday": 2
          "Thursday": 3
          "Friday": 4
          "Saturday": 5
          "Sunday": 6
        target_dow: "{{ days_map[selected_day] }}"
        current_monday: "{{ (now() - timedelta(days=now().weekday())).strftime('%Y-%m-%d') }}"
        target_date: "{{ (as_datetime(current_monday) + timedelta(days=target_dow | int)).strftime('%Y-%m-%d') }}"
    - condition: template
      value_template: "{{ recipe_id | trim | length > 0 }}"
    - action: mealie.set_mealplan
      data:
        config_entry_id: "01KF57HBNBY4RWWRGH5PJKBF1C"
        recipe_id: "{{ recipe_id | trim }}"
        entry_type: dinner
        date: "{{ target_date }}"
    - event: mealie_mealplan_refresh
  mode: single

clear_meal_for_day:
  alias: "Clear Meal for Day"
  description: "Clears the selected day dinner entry in Mealie"
  sequence:
    - variables:
        selected_day: "{{ states('input_select.meal_day_selector') }}"
        days_map:
          "Monday": 0
          "Tuesday": 1
          "Wednesday": 2
          "Thursday": 3
          "Friday": 4
          "Saturday": 5
          "Sunday": 6
        target_dow: "{{ days_map[selected_day] }}"
        current_monday: "{{ (now() - timedelta(days=now().weekday())).strftime('%Y-%m-%d') }}"
        target_date: "{{ (as_datetime(current_monday) + timedelta(days=target_dow | int)).strftime('%Y-%m-%d') }}"
    - action: mealie.set_mealplan
      data:
        config_entry_id: "01KF57HBNBY4RWWRGH5PJKBF1C"
        note_title: "__HA_CLEARED__"
        note_text: "auto-clear"
        entry_type: dinner
        date: "{{ target_date }}"
    - event: mealie_mealplan_refresh
  mode: single

import_recipe_from_url:
  alias: "Import Recipe from URL"
  description: "Imports a recipe into Mealie from a URL"
  sequence:
    - variables:
        url: "{{ states('input_text.recipe_import_url') | trim }}"
    - condition: template
      value_template: "{{ url | length > 0 }}"
    - action: mealie.import_recipe
      data:
        config_entry_id: "01KF57HBNBY4RWWRGH5PJKBF1C"
        url: "{{ url }}"
        include_tags: true
    - action: input_text.set_value
      target:
        entity_id: input_text.recipe_import_url
      data:
        value: ""
    - event: mealie_recipes_refresh
  mode: single

clear_weekly_groceries:
  alias: "Clear Weekly Groceries"
  description: "Removes all items from the Weekly Groceries list"
  sequence:
    - action: todo.get_items
      target:
        entity_id: todo.mealie_weekly_groceries
      data:
        status:
          - needs_action
          - completed
      response_variable: weekly_grocery_items
    - variables:
        items_to_remove: "{{ weekly_grocery_items['todo.mealie_weekly_groceries']['items'] | map(attribute='summary') | reject('equalto', none) | list }}"
    - repeat:
        for_each: "{{ items_to_remove }}"
        sequence:
          - action: todo.remove_item
            target:
              entity_id: todo.mealie_weekly_groceries
            data:
              item: "{{ repeat.item }}"
  mode: single

########################################################################
# Generate grocery list from assigned meals
# Clears existing list, then adds each assigned recipe's ingredients
# via Mealie's native recipe-to-shopping-list endpoint.
########################################################################
generate_groceries_for_mealplan:
  alias: "Generate Groceries for Meal Plan"
  sequence:
    # Clear existing grocery list first
    - service: script.clear_weekly_groceries

    # Wait for clear to complete
    - delay: "00:00:02"

    # For each unique assigned recipe, add its ingredients
    - repeat:
        for_each: >
          {% set meals = state_attr('sensor.mealie_weekly_meal_plan', 'meals') | default([]) %}
          {% set ns = namespace(by_date={}, slugs=[]) %}
          {% for m in meals %}
            {% set ns.by_date = dict(ns.by_date, **{m.date: m}) %}
          {% endfor %}
          {% for m in ns.by_date.values() %}
            {% if m.recipe_name and m.recipe_name | trim != '' and m.recipe_slug not in ns.slugs %}
              {% set ns.slugs = ns.slugs + [m.recipe_slug] %}
            {% endif %}
          {% endfor %}
          {{ ns.slugs }}
        sequence:
          - variables:
              slug: "{{ repeat.item }}"
              rid: >
                {{ (state_attr('sensor.mealie_recipe_browser', 'items') | default([])
                    | selectattr('slug', 'eq', slug)
                    | map(attribute='recipe_id')
                    | list | first) | default('') }}
          - condition: template
            value_template: "{{ rid != '' }}"
          - service: rest_command.mealie_add_recipe_ingredients
            data:
              recipe_id: "{{ rid }}"
  mode: single

########################################################################
# Pick day and assign — wrapper for day picker popup buttons
# Accepts day_name as input, sets the selector, runs assignment.
# Used by inline JS-defined cards where fire-dom-event doesn't work.
########################################################################
pick_day_and_assign:
  alias: "Pick Day and Assign Meal"
  fields:
    day_name:
      description: "Day of the week (e.g., Monday)"
      example: "Monday"
  sequence:
    - service: input_select.select_option
      target:
        entity_id: input_select.meal_day_selector
      data:
        option: "{{ day_name }}"
    - service: script.assign_meal_to_day
  mode: single
