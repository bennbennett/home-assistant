  description: "Randomly selects an activity from the list"
  sequence:
    - service: input_select.select_option
      target:
        entity_id: input_select.toby_activity_selector
      data:
        option: >
          {% set activities = [
            'RC Cars',
            'Toy Cars',
            'Marbles',
            'Read',
            '1-Player Board Games',
            'Make a Movie',
            'Build Lego Set',
            'Lego'
          ] %}
