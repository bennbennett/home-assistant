############################################################
# REST commands (Mealie API)
rest_command:
  mealie_add_recipe_ingredients:
    url: "http://100.68.225.20:9925/api/households/shopping/lists/fc3de051-fb82-44f8-8b07-6f410d8d1166/recipe/{{ recipe_id }}"
    method: POST
    headers:
      Authorization: !secret mealie_token_header
    content_type: "application/json"

  # Fix 2026-04-11: Direct Mealie mealplan creation using slug-based UUID lookup.
  # The HA mealie.get_recipes integration doesn't populate recipe_id in its
  # response variable, so the assign_meal_to_day script can't look up the UUID.
  # This rest_command bypasses the HA integration entirely: the assign script
  # first calls Mealie's /api/recipes/{slug} to get the UUID, then passes it here.
  # Uses the slug from sensor.mealie_recipe_browser (which IS populated).
  mealie_create_mealplan:
    url: "http://100.68.225.20:9925/api/households/mealplans"
    method: POST
    headers:
      Authorization: !secret mealie_token_header
    content_type: "application/json"
    payload: '{"date": "{{ date }}", "entry_type": "{{ entry_type }}", "recipe_id": "{{ recipe_id }}"}'

# Shell commands for meal assign + clear. Both talk to Mealie's REST API
# directly with delete-before-write semantics so the mealplan stays at one
# entry per date — see scripts/assign_meal.sh for the rationale.
shell_command:
  mealie_assign_meal: '/config/scripts/assign_meal.sh "{{ slug }}" "{{ date }}"'
  mealie_clear_meal: '/config/scripts/clear_meal.sh "{{ date }}"'

