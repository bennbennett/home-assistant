############################################################
#                    Core Configuration                      #
############################################################
# Base configuration
default_config:

# Frontend configuration
frontend:
  themes: !include_dir_merge_named themes
  extra_module_url:
    - /hacsfiles/lovelace-card-mod/card-mod.js
    - /local/kiosk-mode/kiosk-mode.js  # Re-enabled 2026-04-07 — Phase 1 cleanup
    - /local/home-hub-fonts.js?v=15  # Phase 3 — Fraunces serif loader (bump ?v= to bust iPad cache; v15 = center middle child (not whole stack) for lights/toby)

# Dashboard configurations
lovelace:
  mode: storage  # Keeps your primary UI-managed dashboard
  # Add additional YAML dashboards
  dashboards:
    tablet-dashboard:  # This is your existing iPad dashboard
      mode: yaml
      title: iPad Dashboard
      icon: mdi:tablet
      show_in_sidebar: true
      filename: dashboards/tablet.yaml

    test-dashboard:  # For testing new features
      mode: yaml
      title: Testing Ground
      icon: mdi:test-tube
      show_in_sidebar: true
      filename: dashboards/test.yaml
      require_admin: true  # Only visible to admin users

    mobile-dashboard:  # New mobile dashboard with React UI design
      mode: yaml
      title: Mobile
      icon: mdi:cellphone
      show_in_sidebar: true
      filename: dashboards/mobile-redesign-v2.yaml
      require_admin: false  # Available to all users

    home-hub:  # Modern iPad dashboard with collapsible sidebar
      mode: yaml
      title: Home Hub
      icon: mdi:view-dashboard-variant
      show_in_sidebar: true
      filename: dashboards/home-hub.yaml
      require_admin: false

    the-countertop:  # Kitchen fridge iPad — hub-and-spoke, 5 views
      mode: yaml
      title: The Countertop
      icon: mdi:countertop
      show_in_sidebar: true
      filename: dashboards/countertop.yaml
      require_admin: false

# Mobile app configuration
mobile_app:

# HTTP and CORS configuration
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - ::1
  cors_allowed_origins:
    - http://homeassistant.local:8123
    - http://localhost:8123
    - http://127.0.0.1:8123

############################################################
#                    Component Config                        #
############################################################
# Browser mod configuration
browser_mod:

# Adaptive Lighting configuration
adaptive_lighting: !include adaptive_lighting.yaml

template:
  # Mealie Recipe List - populated by automation calling mealie.get_recipes
  - trigger:
      - platform: event
        event_type: mealie_recipes_updated
      - platform: homeassistant
        event: start
    sensor:
      - name: "Mealie Recipe Browser"
        unique_id: mealie_recipe_browser
        state: "{{ trigger.event.data.recipes | default([]) | length if trigger.event is defined else 0 }}"
        unit_of_measurement: "recipes"
        attributes:
          items: "{{ trigger.event.data.recipes | default([]) if trigger.event is defined else [] }}"
          last_updated: "{{ now().isoformat() }}"

  # Mealie Weekly Meal Plan - populated by automation calling mealie.get_mealplan
  - trigger:
      - platform: event
        event_type: mealie_mealplan_updated
      - platform: homeassistant
        event: start
    sensor:
      - name: "Mealie Weekly Meal Plan"
        unique_id: mealie_weekly_mealplan
        state: "{{ trigger.event.data.meals | default([]) | length if trigger.event is defined else 0 }}"
        unit_of_measurement: "meals"
        attributes:
          meals: "{{ trigger.event.data.meals | default([]) if trigger.event is defined else [] }}"
          last_updated: "{{ now().isoformat() }}"

  - sensor:
      - name: "Current Month"
        state: "{{ now().strftime('%B %Y') }}"
        icon: mdi:calendar-month

  # Live time/date/greeting sensors for the Home Hub Right Now landing page.
  # Updates every 30 seconds via time_pattern trigger so the dashboard clock
  # stays fresh without browser-side polling.
  - trigger:
      - platform: time_pattern
        seconds: "/30"
      - platform: homeassistant
        event: start
    sensor:
      - name: "Live Time"
        unique_id: live_time
        state: "{{ now().strftime('%-I:%M') }}"
        attributes:
          ampm: "{{ now().strftime('%p') }}"
      - name: "Live Date Long"
        unique_id: live_date_long
        state: "{{ now().strftime('%A, %B %-d') }}"
      - name: "Live Greeting"
        unique_id: live_greeting
        state: >
          {% set h = now().hour %}
          {% if h < 5 %}Up late
          {% elif h < 12 %}Good morning
          {% elif h < 17 %}Good afternoon
          {% elif h < 21 %}Good evening
          {% else %}Good night{% endif %}

  # Upcoming events sensor — populated by `home_hub_fetch_upcoming_events`
  # automation in automations.yaml. Stores next 48h of events from the family
  # calendars for the Right Now landing page.
  - trigger:
      - platform: event
        event_type: home_hub_events_updated
    sensor:
      - name: "Home Hub Upcoming Events"
        unique_id: home_hub_upcoming_events
        state: "{{ trigger.event.data.events | default([]) | length }}"
        attributes:
          events: "{{ trigger.event.data.events | default([]) }}"
          last_updated: "{{ now().isoformat() }}"

  # Today's forecast high/low for the Countertop home header.
  # PirateWeather exposes forecasts via the weather.get_forecasts service
  # (HA 2026.3 removed templow/temperature attributes from the weather entity).
  - trigger:
      - platform: time_pattern
        minutes: "/15"
      - platform: homeassistant
        event: start
    action:
      - service: weather.get_forecasts
        target:
          entity_id: weather.pirateweather
        data:
          type: daily
        response_variable: fc
    sensor:
      - name: "Today High Temp"
        unique_id: today_high_temp
        state: "{{ fc['weather.pirateweather'].forecast[0].temperature | round(0) }}"
        unit_of_measurement: "°F"
      - name: "Today Low Temp"
        unique_id: today_low_temp
        state: "{{ fc['weather.pirateweather'].forecast[0].templow | round(0) }}"
        unit_of_measurement: "°F"
  - binary_sensor:
      - name: "Outside Door"
        unique_id: outside_door_combined
        state: >
          {% if is_state('binary_sensor.door_sensor_outside_opening','on') %}
            on
          {% else %}
            off
          {% endif %}
        device_class: door
  # KP405 Outdoor Dimmer Fix (migrated from legacy platform: template syntax Dec 2025)
  # The TP-Link integration doesn't properly detect the KP405's dimming capability
  - light:
      - name: "Outdoor Lights (Dimmable)"
        unique_id: outdoor_lights_dimmable_template
        state: "{{ states('light.outdoor_lights') }}"
        level: >
          {% if state_attr('light.outdoor_lights', 'brightness') %}
            {{ state_attr('light.outdoor_lights', 'brightness') }}
          {% elif is_state('light.outdoor_lights', 'on') %}
            255
          {% else %}
            0
          {% endif %}
        turn_on:
          - action: light.turn_on
            target:
              entity_id: light.outdoor_lights
            data:
              brightness: "{{ brightness | default(255) }}"
        turn_off:
          - action: light.turn_off
            target:
              entity_id: light.outdoor_lights
        set_level:
          - action: light.turn_on
            target:
              entity_id: light.outdoor_lights
            data:
              brightness: "{{ brightness }}"

