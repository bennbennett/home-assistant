- id: mealie_google_keep_shopping_list_sync
  alias: "Mealie to Google Keep Shopping List Sync"
  description: "Syncs Mealie shopping list to Google Keep"
  mode: single
  triggers:
  - trigger: state
    entity_id: input_button.sync_shopping_list
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: todo.mealie_weekly_groceries
      state: unavailable
  actions:
  - action: todo.get_items
    target:
      entity_id:
      - todo.mealie_weekly_groceries
      - todo.google_keep_shopping_list
    data:
      status:
      - needs_action
    response_variable: all_items
  - variables:
      mealie_items: "{{ all_items['todo.mealie_weekly_groceries']['items'] | map(attribute='summary') | list }}"
      keep_items: "{{ all_items['todo.google_keep_shopping_list']['items'] | map(attribute='summary') | list }}"
      items_to_add: "{{ mealie_items | reject('in', keep_items) | list }}"
  - repeat:
      for_each: "{{ items_to_add }}"
      sequence:
      - action: todo.add_item
        target:
          entity_id: todo.google_keep_shopping_list
        data:
          item: "{{ repeat.item }}"
  - condition: template
    value_template: "{{ items_to_add | length > 0 }}"
  - action: notify.mobile_app_pixel_10
    data:
      title: "Shopping List Updated"
      message: "Added {{ items_to_add | length }} items from Mealie"

- id: mealie_fetch_recipes
  alias: "Mealie: Fetch Recipe List"
  description: "Periodically fetches recipes from Mealie and fires event for template sensor"
  triggers:
    - platform: homeassistant
      event: start
    - platform: time_pattern
      hours: "/1"
  conditions: []
  actions:
    - action: mealie.get_recipes
      data:
        config_entry_id: "01KF57HBNBY4RWWRGH5PJKBF1C"
        result_limit: 100
      response_variable: mealie_response
    - event: mealie_recipes_updated
      event_data:
        recipes: >
          {% set ns = namespace(items=[]) %}
          {% for r in mealie_response['recipes']['items'] | default([]) %}
            {% set ns.items = ns.items + [{
              'name': r.name | default('') | string,
              'slug': r.slug | default('') | string,
              'recipe_id': (r.recipe_id | default(r['id'] | default(''))) | string,
              'total_time': r.total_time | default('') | string,
              'image': r.image | default('') | string,
              'description': r.description | default('') | string
            }] %}
          {% endfor %}
          {{ ns.items }}
  mode: single

- id: mealie_fetch_mealplan
  alias: "Mealie: Fetch Weekly Meal Plan"
  description: "Fetches the weekly meal plan from Mealie"
  triggers:
    - platform: homeassistant
      event: start
    - platform: time_pattern
      minutes: "/30"
    - platform: event
      event_type: mealie_mealplan_refresh
  conditions: []
  actions:
    - variables:
        start_date: "{{ (now() - timedelta(days=now().weekday())).strftime('%Y-%m-%d') }}"
        end_date: "{{ (now() - timedelta(days=now().weekday()) + timedelta(days=6)).strftime('%Y-%m-%d') }}"
    - action: mealie.get_mealplan
      data:
        config_entry_id: "01KF57HBNBY4RWWRGH5PJKBF1C"
        start_date: "{{ start_date }}"
        end_date: "{{ end_date }}"
      response_variable: mealplan_response
    - event: mealie_mealplan_updated
      event_data:
        meals: >
          {% set ns = namespace(items=[]) %}
          {% for m in mealplan_response['mealplan'] | default([]) %}
            {% set ns.items = ns.items + [{
              'date': m.mealplan_date | string,
              'title': m.title | default('', true) | string | trim,
              'recipe_name': m.recipe.name if m.recipe else '',
              'recipe_slug': m.recipe.slug if m.recipe else ''
            }] %}
          {% endfor %}
          {{ ns.items }}
  mode: single

- id: home_hub_fetch_upcoming_events
  alias: "Home Hub: Fetch Upcoming Calendar Events"
  description: "Fetches the next 48h of events from family calendars for the Right Now landing page"
  triggers:
    - platform: homeassistant
      event: start
    - platform: time_pattern
      minutes: "/5"
    - platform: event
      event_type: home_hub_events_refresh
  conditions: []
  actions:
    - variables:
        start_dt: "{{ now().isoformat() }}"
        end_dt: "{{ (now() + timedelta(days=7)).isoformat() }}"
        today_iso: "{{ now().strftime('%Y-%m-%d') }}"
        tomorrow_iso: "{{ (now() + timedelta(days=1)).strftime('%Y-%m-%d') }}"
    - action: calendar.get_events
      target:
        entity_id:
          - calendar.home_calendar
          - calendar.ben_personal
          - calendar.work_calendar
          - calendar.birthdays_anniversaries
      data:
        start_date_time: "{{ start_dt }}"
        end_date_time: "{{ end_dt }}"
      response_variable: events_response
    - event: home_hub_events_updated
      event_data:
        events: >
          {% set ns = namespace(items=[]) %}
          {% for cal_id, cal_data in events_response.items() %}
            {% set cal_short = cal_id.replace('calendar.', '') %}
            {% for ev in cal_data.events | default([]) %}
              {% set start_raw = ev.start | string %}
              {% set end_raw = ev.end | default('') | string %}
              {# Detect Outlook-style all-day: timed events that span midnight to midnight #}
              {% set is_google_all_day = (start_raw | length == 10) %}
              {% set is_outlook_all_day = ('T00:00:00' in start_raw) and ('T00:00:00' in end_raw) %}
              {% set is_all_day = is_google_all_day or is_outlook_all_day %}
              {# Normalize start/end to YYYY-MM-DD for all-day events so consumers don't have to parse #}
              {% if is_all_day %}
                {% set start_str = start_raw[:10] %}
                {% set end_str = end_raw[:10] if end_raw else '' %}
              {% else %}
                {% set start_str = start_raw %}
                {% set end_str = end_raw %}
              {% endif %}
              {% set include_event = true %}
              {% if is_all_day %}
                {# Skip all-day events whose end date is past (Google end is exclusive) #}
                {% if end_str and end_str <= today_iso %}
                  {% set include_event = false %}
                {% endif %}
              {% endif %}
              {% if include_event %}
                {% set ns.items = ns.items + [{
                  'summary': ev.summary | default('') | string,
                  'start': start_str,
                  'end': end_str,
                  'all_day': is_all_day,
                  'calendar': cal_short
                }] %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {{ (ns.items | sort(attribute='start'))[:24] }}
  mode: single

- id: mealie_sync_recipe_selector
  alias: "Mealie: Sync Recipe Selector Options"
  description: "Updates input_select.recipe_selector options from Mealie recipe list"
  triggers:
    - platform: event
      event_type: mealie_recipes_updated
    - platform: homeassistant
      event: start
  conditions: []
  actions:
    - delay: "00:00:05"
    - variables:
        recipes: "{{ state_attr('sensor.mealie_recipe_browser', 'items') | default([]) }}"
        recipe_names: "{{ recipes | map(attribute='name') | sort | list }}"
    - condition: template
      value_template: "{{ recipe_names | length > 0 }}"
    - action: input_select.set_options
      target:
        entity_id: input_select.recipe_selector
      data:
        options: "{{ recipe_names }}"
  mode: single
