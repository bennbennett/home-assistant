- id: fp2_front_house_off_after_5m_no_presence
  alias: FP2 Front House Dim to 20% After 10m No Presence
  description: 'At 10m of no presence (16:00–23:00): if not already dimmed and brightness
    > 20%, snapshot state then dim to 20%.'
  triggers:
  - platform: state
    entity_id: binary_sensor.front_house
    to: 'off'
    for: 00:10:00
  conditions:
  - condition: time
    after: '16:00:00'
    before: '23:00:00'
  - condition: state
    entity_id: light.front_house
    state: 'on'
  - condition: state
    entity_id: input_boolean.front_house_is_dimmed
    state: 'off'
  - condition: template
    value_template: '{{ state_attr(''light.front_house'',''brightness'')|int(0) >
      51 }}'
  actions:
  - action: scene.create
    data:
      scene_id: front_house_pre_dim
      snapshot_entities:
      - light.front_house
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.front_house_is_dimmed
  - action: light.turn_on
    target:
      entity_id: light.front_house
    data:
      brightness_pct: 20
      transition: 10
  - action: logbook.log
    data:
      name: FP2 Front House
      message: 10m no presence → dim to 20% (10s).
      entity_id: light.front_house
  mode: single
- id: fp2_front_house_on_presence_restore
  alias: FP2 Front House On Presence (Restore Pre-Dim)
  description: 'On presence (16:00–23:00): if light was auto-dimmed, restore pre-dim
    state.'
  triggers:
  - platform: state
    entity_id: binary_sensor.front_house
    to: 'on'
  conditions:
  - condition: time
    after: '16:00:00'
    before: '23:00:00'
  - condition: state
    entity_id: input_boolean.front_house_is_dimmed
    state: 'on'
  actions:
  - action: scene.turn_on
    target:
      entity_id: scene.front_house_pre_dim
    data:
      transition: 10
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.front_house_is_dimmed
  - action: logbook.log
    data:
      name: FP2 Front House
      message: Presence → restored pre-dim state (10s).
      entity_id: light.front_house
  mode: single
- id: hourly_adaptive_temp_all_rooms
  alias: Hourly Adaptive Temperature - All Rooms (2min)
  description: >-
    Every hour, apply Adaptive Lighting color temperature to lights that are currently ON.
    Covers: Front House, Master Bedroom, Toby's Room.
    Only affects lights already on - never turns on lights that are off.
  triggers:
  - platform: time_pattern
    minutes: '0'
  conditions: []
  actions:
  - variables:
      kelvin: '{{ state_attr(''switch.adaptive_lighting_living_room'',''color_temp_kelvin'') | int }}'
  # === FRONT HOUSE LIGHTS ===
  - if:
      - condition: state
        entity_id: light.living_room_color
        state: 'on'
    then:
      - action: light.turn_on
        target:
          entity_id: light.living_room_color
        data:
          color_temp_kelvin: '{{ kelvin }}'
          brightness: '{{ state_attr(''light.living_room_color'', ''brightness'') | default(128) | int }}'
          transition: 120
  - if:
      - condition: state
        entity_id: light.kitchen_color
        state: 'on'
    then:
      - action: light.turn_on
        target:
          entity_id: light.kitchen_color
        data:
          color_temp_kelvin: '{{ kelvin }}'
          brightness: '{{ state_attr(''light.kitchen_color'', ''brightness'') | default(128) | int }}'
          transition: 120
  - if:
      - condition: state
        entity_id: light.kitchen_color_1
        state: 'on'
    then:
      - action: light.turn_on
        target:
          entity_id: light.kitchen_color_1
        data:
          color_temp_kelvin: '{{ kelvin }}'
          brightness: '{{ state_attr(''light.kitchen_color_1'', ''brightness'') | default(128) | int }}'
          transition: 120
  - if:
      - condition: state
        entity_id: light.dining_room_color_1
        state: 'on'
    then:
      - action: light.turn_on
        target:
          entity_id: light.dining_room_color_1
        data:
          color_temp_kelvin: '{{ kelvin }}'
          brightness: '{{ state_attr(''light.dining_room_color_1'', ''brightness'') | default(128) | int }}'
          transition: 120
  - if:
      - condition: state
        entity_id: light.dining_room_color_2
        state: 'on'
    then:
      - action: light.turn_on
        target:
          entity_id: light.dining_room_color_2
        data:
          color_temp_kelvin: '{{ kelvin }}'
          brightness: '{{ state_attr(''light.dining_room_color_2'', ''brightness'') | default(128) | int }}'
          transition: 120
  - if:
      - condition: state
        entity_id: light.extended_color_light_1
        state: 'on'
    then:
      - action: light.turn_on
        target:
          entity_id: light.extended_color_light_1
        data:
          color_temp_kelvin: '{{ kelvin }}'
          brightness: '{{ state_attr(''light.extended_color_light_1'', ''brightness'') | default(128) | int }}'
          transition: 120
  # === MASTER BEDROOM LIGHTS ===
  - if:
      - condition: state
        entity_id: light.hue_color_lamp_1
        state: 'on'
    then:
      - action: light.turn_on
        target:
          entity_id: light.hue_color_lamp_1
        data:
          color_temp_kelvin: '{{ kelvin }}'
          brightness: '{{ state_attr(''light.hue_color_lamp_1'', ''brightness'') | default(128) | int }}'
          transition: 120
  - if:
      - condition: state
        entity_id: light.hue_color_lamp_1_2
        state: 'on'
    then:
      - action: light.turn_on
        target:
          entity_id: light.hue_color_lamp_1_2
        data:
          color_temp_kelvin: '{{ kelvin }}'
          brightness: '{{ state_attr(''light.hue_color_lamp_1_2'', ''brightness'') | default(128) | int }}'
          transition: 120
  - if:
      - condition: state
        entity_id: light.hue_color_lamp_1_3
        state: 'on'
    then:
      - action: light.turn_on
        target:
          entity_id: light.hue_color_lamp_1_3
        data:
          color_temp_kelvin: '{{ kelvin }}'
          brightness: '{{ state_attr(''light.hue_color_lamp_1_3'', ''brightness'') | default(128) | int }}'
          transition: 120
  # === TOBY'S ROOM LIGHTS ===
  - if:
      - condition: state
        entity_id: light.toby_s_room_color
        state: 'on'
    then:
      - action: light.turn_on
        target:
          entity_id: light.toby_s_room_color
        data:
          color_temp_kelvin: '{{ kelvin }}'
          brightness: '{{ state_attr(''light.toby_s_room_color'', ''brightness'') | default(128) | int }}'
          transition: 120
  - if:
      - condition: state
        entity_id: light.toby_s_room_color_2
        state: 'on'
    then:
      - action: light.turn_on
        target:
          entity_id: light.toby_s_room_color_2
        data:
          color_temp_kelvin: '{{ kelvin }}'
          brightness: '{{ state_attr(''light.toby_s_room_color_2'', ''brightness'') | default(128) | int }}'
