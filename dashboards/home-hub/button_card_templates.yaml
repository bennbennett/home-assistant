      - justify-self: center
      - margin-top: 8px
    state:
      - font-size: 13px
      - color: '#6B7280'
      - justify-self: center
  custom_fields:
    avatar: |
      [[[
        const color = variables.person_color || '#6D28D9';
        const initial = (variables.person_initial || 'U').charAt(0).toUpperCase();
        return `
          <div style="
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: ${color}20;
            color: ${color};
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            margin: 0 auto;
          ">${initial}</div>
        `;
      ]]]

##############################################################################
#                         Task Item Template                                  #
##############################################################################
home_hub_task_item:
  show_icon: true
  show_name: true
  show_state: false
  styles:
    card:
      - background: white
      - border-radius: 10px
      - padding: 12px 16px
      - margin: 4px 0
      - box-shadow: '0 1px 2px rgba(0,0,0,0.05)'
    grid:
      - grid-template-areas: '"i n"'
      - grid-template-columns: 32px 1fr
    icon:
      - width: 20px
      - height: 20px
      - color: >
          [[[
            const root = document.querySelector('home-assistant');
            if (!root || !root.hass || !entity) return '#D1D5DB';
            const state = root.hass.states[entity];
            return state && state.state === 'on' ? '#4A7C59' : '#D1D5DB';
          ]]]
    name:
      - font-size: 14px
      - font-weight: 500
      - color: >
          [[[
            const root = document.querySelector('home-assistant');
            if (!root || !root.hass || !entity) return '#1F2937';
            const state = root.hass.states[entity];
            return state && state.state === 'on' ? '#9CA3AF' : '#1F2937';
          ]]]
      - text-decoration: >
          [[[
            const root = document.querySelector('home-assistant');
            if (!root || !root.hass || !entity) return 'none';
            const state = root.hass.states[entity];
            return state && state.state === 'on' ? 'line-through' : 'none';
          ]]]
      - padding-left: 8px
  tap_action:
    action: toggle

##############################################################################
#                         Meal Day Pill Template                              #
##############################################################################
home_hub_meal_day_pill:
  show_icon: false
  show_name: false
  show_state: false
  triggers_update:
    - sensor.mealie_weekly_meal_plan
  styles:
    card:
      - background: transparent
      - border-radius: 10px
      - padding: 0
      - border: none
      - box-shadow: none
      - cursor: pointer
      - transition: all 0.15s ease
    custom_fields:
      pill:
        - width: 100%
  custom_fields:
    pill: |
      [[[
        const dayIndex = variables.day_index !== undefined ? variables.day_index : 0;
        const dayAbbrevs = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        const dayAbbrev = dayAbbrevs[dayIndex];
        const now = new Date();
        const currentDay = now.getDay();
        const mondayOffset = currentDay === 0 ? -6 : 1 - currentDay;
        const monday = new Date(now.getFullYear(), now.getMonth(), now.getDate() + mondayOffset);
        const targetDate = new Date(monday);
        targetDate.setDate(monday.getDate() + dayIndex);
        const yr = targetDate.getFullYear();
        const mo = String(targetDate.getMonth() + 1).padStart(2, '0');
        const dy = String(targetDate.getDate()).padStart(2, '0');
        const dateStr = yr + '-' + mo + '-' + dy;
        const todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        const isToday = dateStr === todayStr;
        let mealName = '';
        const mealplan = states['sensor.mealie_weekly_meal_plan'];
        if (mealplan && mealplan.attributes && mealplan.attributes.meals) {
          const meals = mealplan.attributes.meals;
          if (Array.isArray(meals)) {
            for (const m of meals) {
              if ((m.date || '') === dateStr) {
                mealName = m.recipe_name || m.title || '';
                break;
              }
            }
          }
        }
        const forkKnife = '<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>';
        const plusSvg = '<path d="M5 12h14"/><path d="M12 5v14"/>';
        const dayColor = isToday ? '#4A7C59' : '#6B7280';
        const dayWeight = isToday ? '700' : '600';
        if (mealName) {
          const truncated = mealName.length > 13 ? mealName.substring(0, 10) + '...' : mealName;
          return '<div style="text-align:center;">'
            + '<div style="font-size:12px;font-weight:' + dayWeight + ';color:' + dayColor + ';margin-bottom:8px;">' + dayAbbrev + '</div>'
            + '<div style="height:38px;padding:0 8px;border-radius:11px;background:#F3F4F6;border:1px solid #EEF1F3;display:flex;align-items:center;gap:6px;">'
            + '<span style="width:24px;height:24px;background:#E8F0EA;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'
            + '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#74A38A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + forkKnife + '</svg>'
            + '</span>'
            + '<span style="font-size:12px;font-weight:600;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + truncated + '</span>'
            + '</div>'
            + '</div>';
        } else {
          return '<div style="text-align:center;">'
            + '<div style="font-size:12px;font-weight:' + dayWeight + ';color:' + dayColor + ';margin-bottom:8px;">' + dayAbbrev + '</div>'
            + '<div style="height:38px;padding:0 10px;border-radius:11px;background:#FFFFFF;border:1px dashed #D1D5DB;display:flex;align-items:center;gap:6px;justify-content:center;">'
            + '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + plusSvg + '</svg>'
            + '<span style="font-size:12px;color:#9CA3AF;font-weight:500;">Dinner</span>'
            + '</div>'
            + '</div>';
        }
      ]]]
