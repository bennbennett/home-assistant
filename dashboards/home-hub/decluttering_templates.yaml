                        - type: entities
                          entities:
                            - entity: sensor.centauri_carbon_percent_complete
                              name: Progress
                            - entity: sensor.centauri_carbon_current_layer
                              name: Current Layer
                            - entity: sensor.centauri_carbon_remaining_print_time
                              name: Time Remaining
                            - entity: sensor.centauri_carbon_nozzle_temperature
                              name: Nozzle Temp
                            - entity: sensor.centauri_carbon_bed_temperature
                              name: Bed Temp
                            - entity: select.centauri_carbon_print_speed
