                              - grid-template-areas: '"icon title"'
                              - grid-template-columns: 80px 1fr
                            custom_fields:
                              icon: [justify-self: start]
                              title: [justify-self: start, align-self: center]
                          custom_fields:
                            icon: |
                              [[[
                                return `<div style=\"width: 64px; height: 64px; background: #f8f8f6; border-radius: 16px; display: flex; align-items: center; justify-content: center;\">
                                  <ha-icon icon=\"mdi:printer\" style=\"--mdc-icon-size: 32px; color: #B89254;\"></ha-icon>
                                </div>`;
                              ]]]
                            title: |
                              [[[
                                return `<div style=\"display: flex; flex-direction: column;\">
                                  <div style=\"font-size: 24px; font-weight: 600; color: #1F2937;\">Printer</div>
                                  <div style=\"font-size: 16px; color: #9CA3AF;\">Brother MFC-J4335DW</div>
                                </div>`;
                              ]]]
                        - type: custom:button-card
                          show_icon: false
                          show_name: false
                          show_state: false
                          styles:
                            card: [background: none, box-shadow: none, border: none, padding: "24px 0 0 0"]
                            grid:
                              - grid-template-areas: '"toner"'
                              - grid-template-columns: 1fr
                            custom_fields:
                              toner: [width: 100%]
                          custom_fields:
                            toner: |
                              [[[
                                const toners = [
                                  { name: 'Black', entity: 'sensor.mfc_j4335dw_black_toner_remaining', color: '#1F2937' },
                                  { name: 'Cyan', entity: 'sensor.mfc_j4335dw_cyan_toner_remaining', color: '#06B6D4' },
                                  { name: 'Magenta', entity: 'sensor.mfc_j4335dw_magenta_toner_remaining', color: '#EC4899' },
                                  { name: 'Yellow', entity: 'sensor.mfc_j4335dw_yellow_toner_remaining', color: '#EAB308' }
                                ];
                                let rows = toners.map(t => {
                                  const val = states[t.entity] ? states[t.entity].state : '0';
                                  return `<div style=\"display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px;\">
                                    <div style=\"display: flex; justify-content: space-between; align-items: center;\">
                                      <div style=\"font-size: 14px; color: #1F2937;\">${t.name}</div>
                                      <div style=\"font-size: 14px; color: ${t.color}; font-weight: 500;\">${val}%</div>
                                    </div>
                                    <div style=\"width: 100%; height: 8px; background: #f2f1ed; border-radius: 4px; overflow: hidden;\">
                                      <div style=\"width: ${val}%; height: 100%; background: ${t.color}; border-radius: 4px;\"></div>
                                    </div>
                                  </div>`;
                                }).join('');
                                return `<div>${rows}</div>`;
                              ]]]
                        - type: custom:button-card
                          show_icon: false
                          show_name: false
                          styles:
                            card: [background: none, box-shadow: none, border: none, padding: "0"]
                          custom_fields:
                            footer: |
                              [[[
                                return `<div style=\"border-top: 1px solid #f2f1ed; padding-top: 12px; font-size: 14px; color: #9CA3AF;\">
                                  Model: Brother MFC-J4335DW
                                </div>`;
                              ]]]

          # 3D Printer
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - entity: input_boolean.device_filter_all
                    state: "on"
                  - entity: input_boolean.device_filter_computer
                    state: "on"
            card:
              type: custom:button-card
              template: home_hub_device_card
              entity: sensor.centauri_carbon_print_status
              variables:
                name: 3D Printer
                icon: mdi:printer-3d
                device_color: '#B89254'  # honey — appliance warmth
                status_text: "[[[ return states['sensor.centauri_carbon_percent_complete'].state + '% | ' + entity.state ]]]"
              tap_action:
                action: fire-dom-event
                browser_mod:
                  service: browser_mod.popup
                  data:
                    title: 3D Printer
                    content:
                      type: vertical-stack
                      cards:
                        - type: custom:mushroom-title-card
                          title: Centauri Carbon
