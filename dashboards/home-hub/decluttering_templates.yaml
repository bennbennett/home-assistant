                  - light.kitchen_table
                  - light.kitchen
                  - light.outdoor_lights_dimmable
                  - light.front_house
                  - light.bedrooms
                  - light.master_bedroom
                  - light.toby_s_room
                  - light.dining_kitchen_zone

          - type: custom:button-card
            template: home_hub_scene_chip
