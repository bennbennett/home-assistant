home_hub_devices_main:
  card:
    type: vertical-stack
    view_layout:
      grid-column: 2
    card_mod:
      style: |
        :host { padding: 24px 32px; background: #F9FAFB; min-height: calc(100vh - 48px); }
    cards:
      - type: custom:button-card
        template: home_hub_header
        icon: mdi:devices
        name: Devices

      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: repeat(4, auto) 1fr
          grid-gap: 12px
        cards:
          - type: custom:button-card
            template: home_hub_filter_pill
            icon: mdi:archive-outline
            name: All
            entity: input_boolean.device_filter_all
            tap_action:
              action: call-service
              service: script.toggle_device_filter_all

          - type: custom:button-card
            template: home_hub_filter_pill
            icon: mdi:cellphone
            name: Phones
            entity: input_boolean.device_filter_phones
            tap_action:
              action: call-service
              service: script.toggle_device_filter_phones

          - type: custom:button-card
            template: home_hub_filter_pill
            icon: mdi:tablet-ipad
            name: Tablets
            entity: input_boolean.device_filter_tablets
            tap_action:
              action: call-service
              service: script.toggle_device_filter_tablets

          - type: custom:button-card
            template: home_hub_filter_pill
            icon: mdi:desktop-tower-monitor
            name: Computer
            entity: input_boolean.device_filter_computer
            tap_action:
              action: call-service
              service: script.toggle_device_filter_computer

      - type: grid
        columns: 3
        square: false
        card_mod:
          style: |
            ha-card { background: none; box-shadow: none; margin-top: 24px; }
        cards:
          # iPhone
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - entity: input_boolean.device_filter_all
                    state: "on"
                  - entity: input_boolean.device_filter_phones
                    state: "on"
            card:
              type: custom:button-card
              template: home_hub_device_card
              entity: device_tracker.iphone
              variables:
                name: iPhone
                icon: mdi:cellphone
                device_color: '#a386d7'
                battery_entity: sensor.iphone_battery_level
              tap_action:
                action: fire-dom-event
                browser_mod:
                  service: browser_mod.popup
                  data:
                    title: iPhone
                    content:
                      type: vertical-stack
                      cards:
                        # Header Section
                        - type: custom:button-card
                          show_icon: false
                          show_name: false
                          styles:
                            card: [background: none, box-shadow: none, border: none, padding: 0]
                            grid:
                              - grid-template-areas: '"icon title"'
                              - grid-template-columns: 80px 1fr
                            custom_fields:
                              icon: [justify-self: start]
                              title: [justify-self: start, align-self: center]
                          custom_fields:
                            icon: |
                              [[[
                                return `<div style=\"width: 64px; height: 64px; background: #f8f8f6; border-radius: 16px; display: flex; align-items: center; justify-content: center;\">
                                  <ha-icon icon=\"mdi:cellphone\" style=\"--mdc-icon-size: 32px; color: #a386d7;\"></ha-icon>
                                </div>`;
                              ]]]
                            title: |
                              [[[
                                return `<div style=\"display: flex; flex-direction: column;\">
                                  <div style=\"font-size: 24px; font-weight: 600; color: #1F2937;\">iPhone</div>
                                  <div style=\"font-size: 16px; color: #9CA3AF;\">Online</div>
                                </div>`;
                              ]]]

                        # Battery Section
                        - type: custom:button-card
                          entity: sensor.iphone_battery_level
                          show_name: false
                          show_icon: false
                          styles:
                            card: [background: none, box-shadow: none, border: none, padding: "24px 0 0 0"]
                            custom_fields:
                              bar: [width: 100%]
                          custom_fields:
                            bar: |
                              [[[
                                const val = entity.state;
                                return `<div style=\"display: flex; flex-direction: column; gap: 8px;\">
                                  <div style=\"display: flex; justify-content: space-between; align-items: center;\">
                                    <div style=\"display: flex; align-items: center; gap: 8px; font-size: 16px; color: #1F2937;\">
                                      <ha-icon icon=\"mdi:battery\" style=\"--mdc-icon-size: 20px; color: #5aa287;\"></ha-icon>
                                      <span>Battery</span>
                                    </div>
                                    <div style=\"font-size: 16px; color: #5aa287; font-weight: 500;\">${val}%</div>
                                  </div>
                                  <div style=\"width: 100%; height: 8px; background: #f2f1ed; border-radius: 4px; overflow: hidden;\">
                                    <div style=\"width: ${val}%; height: 100%; background: #5aa287;\"></div>
                                  </div>
                                </div>`;
                              ]]]

                        # Network Section
                        - type: custom:mushroom-template-card
                          primary: Network
                          secondary: "{{ states('sensor.iphone_connection_type') }}"
                          icon: mdi:wifi
                          icon_color: green
                          layout: horizontal
                          card_mod:
                            style: |
                              ha-card { background: #f8f8f6; border-radius: 16px; margin-top: 24px; border: none; box-shadow: none; }

                        # Location Section
                        - type: custom:mushroom-template-card
                          primary: Location
                          secondary: "{{ 'Home' if is_state('device_tracker.iphone', 'home') else 'Away' }}"
                          icon: mdi:map-marker
                          icon_color: green
                          layout: horizontal
                          card_mod:
                            style: |
                              ha-card { background: #f8f8f6; border-radius: 16px; margin-top: 12px; border: none; box-shadow: none; }

                        # Quick Actions Header
                        - type: custom:mushroom-title-card
                          title: Quick Actions
                          card_mod:
                            style: |
                              ha-card { margin-top: 12px; }

                        # Quick Actions Grid
                        - type: grid
                          columns: 2
                          square: false
                          cards:
                            - type: custom:mushroom-template-card
                              primary: Ring Device
                              icon: mdi:bell-outline
                              tap_action:
                                action: call-service
                                service: script.find_iphone
                              card_mod:
                                style: |
                                  ha-card { background: white; border: 1px solid #f2f1ed; border-radius: 12px; box-shadow: none; }
                            - type: custom:mushroom-template-card
                              primary: Play Sound
                              icon: mdi:volume-high
                              card_mod:
                                style: |
                                  ha-card { background: white; border: 1px solid #f2f1ed; border-radius: 12px; box-shadow: none; }
                            - type: custom:mushroom-template-card
                              primary: Lock Device
                              icon: mdi:lock-outline
                              card_mod:
                                style: |
                                  ha-card { background: white; border: 1px solid #f2f1ed; border-radius: 12px; box-shadow: none; }
                            - type: custom:mushroom-template-card
                              primary: Sync Now
                              icon: mdi:refresh
                              card_mod:
                                style: |
                                  ha-card { background: white; border: 1px solid #f2f1ed; border-radius: 12px; box-shadow: none; }

                        # Footer
                        - type: custom:button-card
                          show_icon: false
                          show_name: false
                          styles:
                            card: [background: none, box-shadow: none, border: none, padding: "16px 0 0 0"]
                          custom_fields:
                            footer: |
                              [[[
                                const lastSeen = states['device_tracker.iphone'].last_changed;
                                const date = new Date(lastSeen);
                                const now = new Date();
                                const diff = Math.floor((now - date) / 60000);
                                const timeStr = diff < 1 ? 'Just now' : (diff < 60 ? `${diff}m ago` : `${Math.floor(diff/60)}h ago`);
                                return `<div style=\"border-top: 1px solid #f2f1ed; padding-top: 12px; font-size: 14px; color: #9CA3AF;\">
                                  Last seen: ${timeStr} • Model: iPhone
                                </div>`;
                              ]]]

          # Pixel 10
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - entity: input_boolean.device_filter_all
                    state: "on"
                  - entity: input_boolean.device_filter_phones
                    state: "on"
            card:
              type: custom:button-card
              template: home_hub_device_card
              entity: device_tracker.pixel_10
              variables:
                name: Pixel 10
                icon: mdi:cellphone
                device_color: '#a386d7'
                battery_entity: sensor.pixel_10_battery_level
              tap_action:
                action: more-info

          # Small iPad
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - entity: input_boolean.device_filter_all
                    state: "on"
                  - entity: input_boolean.device_filter_tablets
                    state: "on"
            card:
              type: custom:button-card
              template: home_hub_device_card
              entity: device_tracker.benjamins_ipad
              variables:
                name: Small iPad
                icon: mdi:tablet-ipad
                device_color: '#3B82F6'
                battery_entity: sensor.benjamins_ipad_battery_level
              tap_action:
                action: more-info

          # Big iPad
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - entity: input_boolean.device_filter_all
                    state: "on"
                  - entity: input_boolean.device_filter_tablets
                    state: "on"
            card:
              type: custom:button-card
              template: home_hub_device_card
              entity: device_tracker.ipad
              variables:
                name: Big iPad
                icon: mdi:tablet-ipad
                device_color: '#3B82F6'
                battery_entity: sensor.ipad_battery_level
              tap_action:
                action: more-info

          # Printer
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - entity: input_boolean.device_filter_all
                    state: "on"
                  - entity: input_boolean.device_filter_computer
                    state: "on"
            card:
              type: custom:button-card
              template: home_hub_device_card
              variables:
                name: Printer
                icon: mdi:printer
                device_color: '#5aa287'
                status_text: 'Black Ink: 88%'
              tap_action:
                action: more-info

          # 3D Printer
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - entity: input_boolean.device_filter_all
                    state: "on"
                  - entity: input_boolean.device_filter_computer
                    state: "on"
            card:
              type: custom:button-card
              template: home_hub_device_card
              entity: sensor.centauri_carbon_print_status
              variables:
                name: 3D Printer
                icon: mdi:printer-3d
                device_color: '#5aa287'
                status_text: "[[[ return states['sensor.centauri_carbon_percent_complete'].state + '% | ' + entity.state ]]]"
              tap_action:
                action: fire-dom-event
                browser_mod:
                  service: browser_mod.popup
                  data:
                    title: 3D Printer
                    content:
                      type: vertical-stack
                      cards:
                        - type: custom:mushroom-title-card
                          title: Centauri Carbon
                          subtitle: "Status: {{ states('sensor.centauri_carbon_print_status') }}"
                          card_mod:
                            style: |
                              ha-card { border-left: 4px solid #F59E0B; padding-left: 16px; background: rgba(245, 158, 11, 0.08); border-radius: 12px; margin-bottom: 12px; }
                        - type: picture-entity
                          entity: camera.centauri_carbon_chamber_camera
                          camera_view: live
                          card_mod:
                            style: |
                              ha-card { border-radius: 12px; margin-bottom: 8px; }
                        - type: entities
                          entities:
                            - entity: sensor.centauri_carbon_percent_complete
                              name: Progress
                            - entity: sensor.centauri_carbon_current_layer
                              name: Current Layer
                            - entity: sensor.centauri_carbon_remaining_print_time
                              name: Time Remaining
                            - entity: sensor.centauri_carbon_nozzle_temperature
                              name: Nozzle Temp
                            - entity: sensor.centauri_carbon_bed_temperature
                              name: Bed Temp
                            - entity: select.centauri_carbon_print_speed
