      # Search, filter chips, and recipe grid
      - type: custom:button-card
        show_name: false
        show_icon: false
        show_state: false
        tap_action:
          action: none
        hold_action:
          action: none
        styles:
          card:
            - background: none
            - box-shadow: none
            - border: none
            - padding: 0
          grid:
            - grid-template-areas: '"browser"'
            - grid-template-columns: 1fr
          custom_fields:
            browser:
              - width: 100%
              - pointer-events: auto
        custom_fields:
          browser: |
            [[[
              const recipeSensor = states['sensor.mealie_recipe_browser'];
              const items = recipeSensor && recipeSensor.attributes && Array.isArray(recipeSensor.attributes.items)
                ? recipeSensor.attributes.items
                : [];
              const esc = (s) => (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

              // Zero-recipe empty state
              if (items.length === 0) {
                const bookOpenIcon = '<path d="M12 7v14"/><path d="M16 12h2"/><path d="M16 8h2"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/>';
                return '<div style="text-align:center;padding:48px 20px;">'
                  + '<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#BDBDBD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' + bookOpenIcon + '</svg>'
                  + '<div style="font-size:16px;font-weight:500;color:#374151;margin-top:16px;">Add some family favorites to get started</div>'
                  + '<div style="font-size:13px;color:#9CA3AF;margin-top:4px;">Import recipes to start planning meals</div>'
                  + '</div>';
              }

              // Utility functions (kept from existing)
              const parseMinutes = (text) => {
                if (!text) return 0;
                let mins = 0;
                const h = text.match(/(\\d+)\\s*hour/i);
                const m = text.match(/(\\d+)\\s*minute/i);
                if (h) mins += Number(h[1]) * 60;
                if (m) mins += Number(m[1]);
                return mins;
              };

              const mapTextToCategory = (text) => {
                const hay = (text || '').toLowerCase();
                if (/(shrimp|salmon|tuna|cod|halibut|tilapia|fish|scallop|clam|mussel|anchovy|crab|lobster|prawn|seafood)/.test(hay)) return 'seafood';
                if (/(chicken|thigh|drumstick|poultry)/.test(hay)) return 'chicken';
                if (/(beef|steak|brisket|sirloin|ground beef|short rib)/.test(hay)) return 'beef';
                if (/(pork|bacon|ham|prosciutto|sausage|chorizo)/.test(hay)) return 'pork';
                if (/(vegetarian|vegan|tofu|lentil|chickpea|mushroom|eggplant|cauliflower)/.test(hay)) return 'vegetarian';
                return '';
              };

              const flattenLabels = (value) => {
                if (!value) return [];
                if (Array.isArray(value)) {
                  return value.flatMap((entry) => {
                    if (!entry) return [];
                    if (typeof entry === 'string') return [entry];
                    const fromObj = entry.name || entry.label || entry.title || entry.category || entry.slug || '';
                    return fromObj ? [fromObj] : [];
                  });
                }
                if (typeof value === 'string') return [value];
                if (typeof value === 'object') {
                  const fromObj = value.name || value.label || value.title || value.category || value.slug || '';
                  return fromObj ? [fromObj] : [];
                }
                return [];
              };

              const classify = (recipe) => {
                const directFields = [
                  recipe.category_key, recipe.category, recipe.category_name,
                  recipe.recipe_category, recipe.meal_type
                ].filter(Boolean);
                const tagFields = [
                  ...flattenLabels(recipe.tags), ...flattenLabels(recipe.recipe_tags),
                  ...flattenLabels(recipe.categories), ...flattenLabels(recipe.recipe_categories)
                ];
                for (const text of [...directFields, ...tagFields]) {
                  const mapped = mapTextToCategory(text);
                  if (mapped) return mapped;
                }
                return mapTextToCategory((recipe.name || '') + ' ' + (recipe.description || '')) || 'uncategorized';
              };

              // Color cycling for initial letter backgrounds
              const initialColors = ['#E8F5E9', '#FFF3E0', '#EFEBE9', '#ECEFF1', '#F3E5F5'];
              const hashName = (name) => {
                let h = 0;
                for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
                return Math.abs(h);
              };

              // Info icon SVG (circle-i)
              const infoIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>';

              // Build recipe cards
              let cards = '';
              for (const recipe of items) {
                let timeStr = recipe.total_time || '';
                if (timeStr) {
                  timeStr = timeStr.replace(/(\d+)\s*hours?/, '$1h').replace(/(\d+)\s*minutes?/, '$1m').replace(/\s+/g, ' ').trim();
                }
                const safeName = esc(recipe.name || 'Untitled Recipe');
                const searchName = (recipe.name || '').toLowerCase();
                const searchDesc = (recipe.description || '').toLowerCase();
                const cardId = 'recipe-' + recipe.slug;
                const category = classify(recipe);

                // Image area: real image or colored initial letter
                const hasImage = recipe.recipe_id && recipe.image && recipe.image !== 'None';
                const imgUrl = hasImage ? 'http://100.68.225.20:9925/api/media/recipes/' + recipe.recipe_id + '/images/min-original.webp' : '';
                const initial = (recipe.name || 'R').charAt(0).toUpperCase();
                const bgColor = initialColors[hashName(recipe.name || '') % initialColors.length];

                const imageArea = hasImage
                  ? '<div style="position:relative;height:120px;border-radius:12px 12px 0 0;overflow:hidden;background:#FAFAF9;">'
                    + '<img src="' + imgUrl + '" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';" />'
                    + '<div style="display:none;width:100%;height:100%;align-items:center;justify-content:center;background:' + bgColor + ';"><span style="font-size:32px;font-weight:300;color:#5c6470;">' + initial + '</span></div>'
                    + '<div class="recipe-info-btn" style="position:absolute;top:6px;right:6px;width:28px;height:28px;background:rgba(255,255,255,0.9);border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;z-index:2;">' + infoIcon + '</div>'
                    + '</div>'
                  : '<div style="position:relative;height:120px;border-radius:12px 12px 0 0;background:' + bgColor + ';display:flex;align-items:center;justify-content:center;">'
                    + '<span style="font-size:32px;font-weight:300;color:#5c6470;">' + initial + '</span>'
                    + '<div class="recipe-info-btn" style="position:absolute;top:6px;right:6px;width:28px;height:28px;background:rgba(255,255,255,0.9);border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;z-index:2;">' + infoIcon + '</div>'
                    + '</div>';

                cards += '<div class="home-hub-recipe-card" id="' + cardId + '" data-category="' + category + '" data-name="' + esc(searchName) + '" data-desc="' + esc(searchDesc) + '" role="button" tabindex="0" style="background:white;border-radius:14px;cursor:pointer;border:1px solid #E5E7EB;transition:all 0.15s ease;touch-action:manipulation;-webkit-tap-highlight-color:transparent;overflow:hidden;">'
                  + imageArea
                  + '<div style="padding:10px 12px 12px 12px;">'
                  + '<div style="font-size:14px;font-weight:500;color:#1F2937;line-height:1.3;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:36px;">' + safeName + '</div>'
                  + (timeStr ? '<div style="font-size:12px;color:#7c8493;display:flex;align-items:center;gap:4px;"><ha-icon icon="mdi:clock-outline" style="--mdc-icon-size:13px;color:#7c8493;"></ha-icon>' + timeStr + '</div>' : '')
                  + '</div>'
                  + '</div>';
              }

              // Search + filter chips (kept from existing)
              const controls = '<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px;">'
                + '<div style="flex:1;min-width:260px;position:relative;">'
                + '<ha-icon icon="mdi:magnify" style="position:absolute;left:10px;top:10px;--mdc-icon-size:16px;color:#9CA3AF;"></ha-icon>'
                + '<input id="home-hub-meal-search" type="text" placeholder="Search recipes..." style="width:100%;height:36px;border:1px solid #E5E7EB;border-radius:10px;padding:0 12px 0 34px;font-size:13px;color:#1F2937;background:white;box-sizing:border-box;" />'
                + '</div>'
                + '<div id="home-hub-filter-chips" style="display:flex;gap:8px;flex-wrap:wrap;">'
                + '<button type="button" class="home-hub-filter-chip is-active" data-cat="all" style="height:32px;padding:0 12px;border-radius:9px;border:1px solid #4A7C59;background:#4A7C59;color:white;font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;">All</button>'
                + '<button type="button" class="home-hub-filter-chip" data-cat="chicken" style="height:32px;padding:0 12px;border-radius:9px;border:1px solid #E5E7EB;background:white;color:#374151;font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;">Chicken</button>'
                + '<button type="button" class="home-hub-filter-chip" data-cat="beef" style="height:32px;padding:0 12px;border-radius:9px;border:1px solid #E5E7EB;background:white;color:#374151;font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;">Beef</button>'
                + '<button type="button" class="home-hub-filter-chip" data-cat="seafood" style="height:32px;padding:0 12px;border-radius:9px;border:1px solid #E5E7EB;background:white;color:#374151;font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;">Seafood</button>'
                + '<button type="button" class="home-hub-filter-chip" data-cat="pork" style="height:32px;padding:0 12px;border-radius:9px;border:1px solid #E5E7EB;background:white;color:#374151;font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;">Pork</button>'
                + '<button type="button" class="home-hub-filter-chip" data-cat="vegetarian" style="height:32px;padding:0 12px;border-radius:9px;border:1px solid #E5E7EB;background:white;color:#374151;font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;">Vegetarian</button>'
                + '</div>'
                + '</div>';

              const output = controls
                + '<div id="home-hub-recipe-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;">'
                + cards
                + '</div>'
                + '<div id="home-hub-empty-state" style="display:none;color:#6B7280;padding:20px 10px;text-align:center;">No recipes match this filter.</div>';

              window.setTimeout(() => {
                const scope = this.shadowRoot || document;
                const searchInput = scope.getElementById('home-hub-meal-search');
                const chipsWrap = scope.getElementById('home-hub-filter-chips');
                const emptyState = scope.getElementById('home-hub-empty-state');
                if (!searchInput || !chipsWrap || !emptyState) return;
                let selected = 'all';

                const setChipStyle = (chip, isActive) => {
                  chip.classList.toggle('is-active', isActive);
                  chip.style.background = isActive ? '#4A7C59' : 'white';
                  chip.style.borderColor = isActive ? '#4A7C59' : '#E5E7EB';
                  chip.style.color = isActive ? 'white' : '#374151';
                };

                const applyFilters = () => {
                  const query = (searchInput.value || '').toLowerCase().trim();
                  const recipeCards = scope.querySelectorAll('.home-hub-recipe-card');
                  let visibleCount = 0;
                  recipeCards.forEach((card) => {
                    const name = card.getAttribute('data-name') || '';
                    const desc = card.getAttribute('data-desc') || '';
                    const cat = card.getAttribute('data-category') || 'uncategorized';
                    const queryMatch = !query || name.includes(query) || desc.includes(query);
                    const catMatch = selected === 'all' || cat === selected;
                    const show = queryMatch && catMatch;
                    card.style.display = show ? '' : 'none';
                    if (show) visibleCount += 1;
                  });
                  emptyState.style.display = visibleCount === 0 ? 'block' : 'none';
                };

                window.setTimeout(() => {
                  // Recipe detail popup (for info icon)
                  const openRecipePopup = (recipe, target) => {
                    let md = '';
                    const desc = (recipe.description || '').trim();
                    if (desc) md += desc + '\n\n';
                    const parts = [];
                    if (recipe.prep_time) parts.push('**Prep:** ' + recipe.prep_time);
                    if (recipe.perform_time) parts.push('**Cook:** ' + recipe.perform_time);
                    if (recipe.total_time) parts.push('**Total:** ' + recipe.total_time);
                    if (recipe.recipe_yield) parts.push('**Yield:** ' + recipe.recipe_yield);
                    if (parts.length) md += parts.join(' · ') + '\n\n';
                    if (recipe.original_url) md += '[View Original Recipe](' + recipe.original_url + ')\n\n';
                    md += '[Open in Mealie](http://100.68.225.20:9925/g/home/r/' + recipe.slug + ')';
                    const evt = new Event('ll-custom', { bubbles: true, composed: true });
                    evt.detail = {
                      browser_mod: {
                        service: 'browser_mod.popup',
                        data: {
                          title: recipe.name || 'Recipe',
                          size: 'normal',
                          content: { type: 'markdown', content: md }
                        }
                      }
                    };
                    target.dispatchEvent(evt);
                  };

                  // Day picker popup (for card body tap)
                  const openDayPicker = (recipe, target) => {
                    const dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
                    const dayAbbrevs = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
                    const now = new Date();
                    const curDay = now.getDay();
                    const monOff = curDay === 0 ? -6 : 1 - curDay;
                    const mon = new Date(now.getFullYear(), now.getMonth(), now.getDate() + monOff);
                    const todayStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');

                    // Check which days are filled
                    const mp = states['sensor.mealie_weekly_meal_plan'];
                    const mealsArr = (mp && mp.attributes && Array.isArray(mp.attributes.meals)) ? mp.attributes.meals : [];
                    const filledDays = {};
                    mealsArr.forEach(function(m) {
                      filledDays[m.date] = m.recipe_name || '';
                    });
                    Object.keys(filledDays).forEach(function(d) { if (!filledDays[d].trim()) delete filledDays[d]; });

                    // Build 7 day button cards
                    const dayCards = [];
                    for (let i = 0; i < 7; i++) {
                      const td = new Date(mon);
                      td.setDate(mon.getDate() + i);
                      const ds = td.getFullYear() + '-' + String(td.getMonth()+1).padStart(2,'0') + '-' + String(td.getDate()).padStart(2,'0');
                      const isToday = ds === todayStr;
                      const isFilled = !!filledDays[ds];
                      const mealText = isFilled ? filledDays[ds] : '';
                      const truncMeal = mealText.length > 22 ? mealText.substring(0, 20) + '..' : mealText;

                      dayCards.push({
                        type: 'custom:button-card',
                        show_icon: false,
                        show_name: false,
                        show_state: false,
                        styles: {
                          card: [
                            { background: isFilled ? '#F5F5F5' : (isToday ? '#E8F5E9' : 'white') },
                            { border: isFilled ? '1px solid #E0E0E0' : (isToday ? '1px solid #4A7C59' : '1px solid #E5E7EB') },
                            { 'border-radius': '10px' },
                            { padding: '10px 14px' },
                            { cursor: 'pointer' },
                            { 'box-shadow': 'none' },
                            { 'min-height': '44px' }
                          ],
                          grid: [
                            { 'grid-template-areas': '"lbl"' },
                            { 'grid-template-columns': '1fr' }
                          ],
                          custom_fields: { lbl: [{ width: '100%' }] }
                        },
                        custom_fields: {
                          lbl: '<div style="display:flex;justify-content:space-between;align-items:center;">'
                            + '<div>'
                            + '<div style="font-size:14px;font-weight:600;color:' + (isFilled ? '#BDBDBD' : '#374151') + ';">' + dayAbbrevs[i] + ' ' + td.getDate() + '</div>'
                            + (isFilled ? '<div style="font-size:12px;color:#9CA3AF;margin-top:2px;">' + truncMeal + '</div>' : '<div style="font-size:12px;color:#4A7C59;margin-top:2px;">Available</div>')
                            + '</div>'
                            + (isToday ? '<span style="font-size:10px;font-weight:600;color:#4A7C59;background:#E8F5E9;padding:2px 6px;border-radius:4px;">TODAY</span>' : '')
                            + '</div>'
                        },
                        tap_action: {
                          action: 'call-service',
                          service: 'script.pick_day_and_assign',
                          service_data: {
                            day_name: dayNames[i]
                          }
                        }
                      });
                    }

                    // Cancel button
                    dayCards.push({
                      type: 'custom:button-card',
                      name: 'Cancel',
                      icon: 'mdi:close',
                      styles: {
                        card: [
                          { 'border-radius': '12px' },
                          { padding: '8px 12px' },
                          { 'margin-top': '8px' },
                          { background: 'rgb(243,244,246)' },
                          { 'box-shadow': 'none' }
                        ],
                        grid: [
                          { 'grid-template-areas': '"i n"' },
                          { 'grid-template-columns': 'min-content 1fr' }
                        ],
                        icon: [{ width: '20px' }, { height: '20px' }, { color: 'rgb(107,114,128)' }],
                        name: [{ color: 'rgb(107,114,128)' }, { 'font-size': '14px' }, { 'margin-left': '8px' }]
                      },
                      tap_action: {
                        action: 'fire-dom-event',
                        browser_mod: { service: 'browser_mod.close_popup' }
                      }
                    });

                    const evt = new Event('ll-custom', { bubbles: true, composed: true });
                    evt.detail = {
                      browser_mod: {
                        service: 'browser_mod.sequence',
                        data: {
                          sequence: [
                            { service: 'input_select.select_option', data: { entity_id: 'input_select.recipe_selector', option: recipe.name } },
                            { service: 'browser_mod.popup', data: {
                              title: 'Pick a day for ' + (recipe.name || 'Recipe'),
                              size: 'normal',
                              content: { type: 'vertical-stack', cards: dayCards }
                            }}
                          ]
                        }
                      }
                    };
                    target.dispatchEvent(evt);
                  };

                  // Bind event handlers to recipe cards
                  const recipeCards = scope.querySelectorAll('.home-hub-recipe-card');
                  recipeCards.forEach((card) => {
                    if (card._popupBound) return;
                    card._popupBound = true;
                    const slug = (card.id || '').replace('recipe-', '');
                    const recipe = items.find((r) => r.slug === slug);
                    if (!recipe) return;

                    // Info icon handler (opens recipe detail)
                    const infoBtn = card.querySelector('.recipe-info-btn');
                    if (infoBtn) {
                      let infoTouchAt = 0;
                      infoBtn.addEventListener('pointerdown', (ev) => { ev.stopPropagation(); }, { passive: true });
                      infoBtn.addEventListener('pointerup', (ev) => {
                        ev.stopPropagation(); ev.preventDefault();
                        infoTouchAt = Date.now();
                        openRecipePopup(recipe, card);
                      });
                      infoBtn.addEventListener('click', (ev) => {
                        ev.stopPropagation(); ev.preventDefault();
                        if (Date.now() - infoTouchAt < 700) return;
                        openRecipePopup(recipe, card);
                      });
                    }

                    // Card body handler (opens day picker)
                    let lastTouchOpenAt = 0;
                    let pointerStart = null;
                    let touchStart = null;

                    card.addEventListener('pointerdown', (ev) => {
                      if (ev.target && ev.target.closest && ev.target.closest('.recipe-info-btn')) return;
                      pointerStart = { x: ev.clientX, y: ev.clientY, pointerType: ev.pointerType || 'mouse' };
                    }, { passive: true });

                    card.addEventListener('pointerup', (ev) => {
                      if (!pointerStart) return;
                      if (ev.target && ev.target.closest && ev.target.closest('.recipe-info-btn')) { pointerStart = null; return; }
                      const deltaX = Math.abs(ev.clientX - pointerStart.x);
                      const deltaY = Math.abs(ev.clientY - pointerStart.y);
                      const pType = pointerStart.pointerType;
                      pointerStart = null;
                      if (pType === 'mouse' || deltaX > 10 || deltaY > 10) return;
                      lastTouchOpenAt = Date.now();
                      ev.preventDefault(); ev.stopPropagation();
                      openDayPicker(recipe, card);
                    });

                    card.addEventListener('touchstart', (ev) => {
                      if (window.PointerEvent) return;
                      if (ev.target && ev.target.closest && ev.target.closest('.recipe-info-btn')) return;
                      const touch = ev.changedTouches && ev.changedTouches[0];
                      if (!touch) return;
                      touchStart = { x: touch.clientX, y: touch.clientY };
                    }, { passive: true });

                    card.addEventListener('touchend', (ev) => {
                      if (window.PointerEvent || !touchStart) return;
                      if (ev.target && ev.target.closest && ev.target.closest('.recipe-info-btn')) { touchStart = null; return; }
                      const touch = ev.changedTouches && ev.changedTouches[0];
                      if (!touch) return;
                      const deltaX = Math.abs(touch.clientX - touchStart.x);
                      const deltaY = Math.abs(touch.clientY - touchStart.y);
                      touchStart = null;
                      if (deltaX > 10 || deltaY > 10) return;
                      lastTouchOpenAt = Date.now();
                      ev.preventDefault(); ev.stopPropagation();
                      openDayPicker(recipe, card);
                    });

                    card.addEventListener('click', (ev) => {
                      if (ev.target && ev.target.closest && ev.target.closest('.recipe-info-btn')) return;
                      if (Date.now() - lastTouchOpenAt < 700) return;
                      ev.preventDefault(); ev.stopPropagation();
                      openDayPicker(recipe, card);
                    });

                    card.addEventListener('keydown', (ev) => {
                      if (ev.key !== 'Enter' && ev.key !== ' ') return;
                      ev.preventDefault(); ev.stopPropagation();
                      openDayPicker(recipe, card);
                    });
                  });
                }, 0);

                if (!searchInput._filterBound) {
                  searchInput._filterBound = true;
                  searchInput.addEventListener('input', applyFilters);
                }

                // Filter chip handlers (kept from existing)
                const chips = chipsWrap.querySelectorAll('.home-hub-filter-chip');
                const activateChip = (chip, ev) => {
                  if (!chip) return;
                  if (ev) { ev.preventDefault(); ev.stopPropagation(); }
                  selected = chip.getAttribute('data-cat') || 'all';
                  chips.forEach((other) => setChipStyle(other, other === chip));
                  applyFilters();
                };

                chips.forEach((chip) => {
                  if (chip._filterBound) return;
                  chip._filterBound = true;

                  let lastChipTouchAt = 0;
                  let pointerStart = null;
                  let touchStart = null;

                  chip.addEventListener('pointerdown', (ev) => {
                    pointerStart = { x: ev.clientX, y: ev.clientY, pointerType: ev.pointerType || 'mouse' };
                  }, { passive: true });

                  chip.addEventListener('pointerup', (ev) => {
                    if (!pointerStart) return;
                    const deltaX = Math.abs(ev.clientX - pointerStart.x);
                    const deltaY = Math.abs(ev.clientY - pointerStart.y);
                    const pType = pointerStart.pointerType;
                    pointerStart = null;
                    if (pType === 'mouse' || deltaX > 10 || deltaY > 10) return;
                    lastChipTouchAt = Date.now();
                    activateChip(chip, ev);
                  });

                  chip.addEventListener('touchstart', (ev) => {
                    if (window.PointerEvent) return;
                    const touch = ev.changedTouches && ev.changedTouches[0];
                    if (!touch) return;
                    touchStart = { x: touch.clientX, y: touch.clientY };
                  }, { passive: true });

                  chip.addEventListener('touchend', (ev) => {
                    if (window.PointerEvent || !touchStart) return;
                    const touch = ev.changedTouches && ev.changedTouches[0];
                    if (!touch) return;
                    const deltaX = Math.abs(touch.clientX - touchStart.x);
                    const deltaY = Math.abs(touch.clientY - touchStart.y);
                    touchStart = null;
                    if (deltaX > 10 || deltaY > 10) return;
                    lastChipTouchAt = Date.now();
                    activateChip(chip, ev);
                  });

                  chip.addEventListener('click', (ev) => {
                    if (Date.now() - lastChipTouchAt < 700) return;
                    activateChip(chip, ev);
                  });
                });

                applyFilters();
              }, 0);

              return output;
            ]]]

# Room Grid Template (for consistent layout)
home_hub_room_grid:
  card:
    type: grid
    columns: 3
    square: false
    cards:
      - type: custom:button-card
        template: home_hub_room_card
        name: "[[name]]"
        icon: "[[icon]]"
        variables:
          room_color: "[[color]]"
          temp_entity: "[[temp_entity]]"
          light_entity: "[[light_entity]]"

# Scene Buttons Row Template
home_hub_scene_row:
  card:
    type: horizontal-stack
    cards:
      # Relax
      - type: custom:button-card
        template: home_hub_scene_button
        icon: mdi:sofa
        name: Relax
        variables:
          scene_color: '#4A7C59'
        tap_action:
          action: call-service
          service: scene.turn_on
          service_data:
            entity_id: scene.front_house_relax

      # All Off
      - type: custom:button-card
        template: home_hub_scene_button
        icon: mdi:lightbulb-off-outline
        name: All Off
        variables:
          scene_color: '#6B7280'
        tap_action:
          action: call-service
          service: light.turn_off
          target:
            entity_id:
              - light.living_room_color
              - light.extended_color_light_1
              - light.bedroom
              - light.kitchen_table
              - light.kitchen
              - light.outdoor_lights_dimmable
              - light.front_house
              - light.bedrooms
              - light.master_bedroom
              - light.toby_s_room
              - light.dining_kitchen_zone

      # Bright
      - type: custom:button-card
        template: home_hub_scene_button
        icon: mdi:brightness-7
        name: Bright
        variables:
          scene_color: '#F59E0B'
        tap_action:
          action: call-service
          service: scene.turn_on
          service_data:
            entity_id: scene.front_house_concentrate

      # Morning
      - type: custom:button-card
        template: home_hub_scene_button
        icon: mdi:weather-sunny
        name: Morning
        variables:
          scene_color: '#F97316'
        tap_action:
          action: call-service
          service: script.turn_on
          service_data:
            entity_id: script.good_morning_sequence

      # Good Night
      - type: custom:button-card
        template: home_hub_scene_button
        icon: mdi:weather-night
        name: Good Night
        variables:
          scene_color: '#6366F1'
        tap_action:
          action: call-service
          service: script.turn_on
          service_data:
            entity_id: script.good_night_sequence
