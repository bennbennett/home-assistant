##############################################################################
home_hub_meals_main:
  card:
    type: vertical-stack
    view_layout:
      grid-column: 2
    card_mod:
      style: |
        :host {
          padding: 24px 32px !important;
          background: #fbfaf9;
          min-height: calc(100vh - 48px);
          position: relative;
          z-index: 0;
        }
    cards:
      # Header: "Plan This Week" + progress counter
      - type: custom:button-card
        entity: sensor.mealie_weekly_meal_plan
        show_icon: false
        show_name: false
        show_state: false
        tap_action:
          action: none
        hold_action:
          action: none
        triggers_update:
          - sensor.mealie_weekly_meal_plan
        styles:
          card:
            - background: none
            - box-shadow: none
            - border: none
            - padding: 8px 0
          grid:
            - grid-template-areas: '"header"'
            - grid-template-columns: 1fr
          custom_fields:
            header:
              - width: 100%
        custom_fields:
          header: |
            [[[
              const mealplan = states['sensor.mealie_weekly_meal_plan'];
              const meals = (mealplan && mealplan.attributes && Array.isArray(mealplan.attributes.meals)) ? mealplan.attributes.meals : [];
              const byDate = {};
              meals.forEach(function(m) { byDate[m.date] = m.recipe_name || ''; });
              const filled = Object.values(byDate).filter(function(n) { return n.trim().length > 0; }).length;
              const progressColor = filled === 7 ? '#4A7C59' : '#7c8493';
              return '<div style="display:flex;justify-content:space-between;align-items:center;gap:16px;">'
                + '<div style="font-size:24px;font-weight:600;line-height:1.2;color:#1F2937;">Plan This Week</div>'
                + '<div style="font-size:15px;font-weight:500;color:' + progressColor + ';">' + filled + ' of 7 meals picked</div>'
                + '</div>';
            ]]]

      # Action banner with context text + Done Planning button
      - type: custom:button-card
        entity: sensor.mealie_weekly_meal_plan
        show_icon: false
        show_name: false
        show_state: false
        triggers_update:
          - sensor.mealie_weekly_meal_plan
        styles:
          card:
            - background: '#F5F5F0'
            - box-shadow: none
            - border: none
            - border-radius: 12px
            - padding: 12px 16px
            - margin-top: 8px
          grid:
            - grid-template-areas: '"banner"'
            - grid-template-columns: 1fr
          custom_fields:
            banner:
              - width: 100%
        custom_fields:
          banner: |
            [[[
              const mealplan = states['sensor.mealie_weekly_meal_plan'];
              const meals = (mealplan && mealplan.attributes && Array.isArray(mealplan.attributes.meals)) ? mealplan.attributes.meals : [];
              const byDate = {};
              meals.forEach(function(m) { byDate[m.date] = m.recipe_name || ''; });
              const filled = Object.values(byDate).filter(function(n) { return n.trim().length > 0; }).length;
              let bannerText = 'Pick dinners for the week from the recipes below';
