      - type: grid
        columns: 3
        square: false
        card_mod:
          style: |
            ha-card {
              background: none;
              box-shadow: none;
              margin-top: 24px;
            }
        cards:
          - type: custom:button-card
            template: home_hub_room_card
            entity: light.front_house
            triggers_update:
              - sensor.living_room_temp_temperature
              - light.front_house
            variables:
              room_name: Front House
              room_icon: home
              room_icon_color: '#C87456'  # terracotta — the threshold
              temp_entity: sensor.living_room_temp_temperature
              light_entity: light.front_house
            custom_fields:
              status:
                card:
                  type: custom:button-card
                  entity: light.front_house
                  show_icon: false
                  show_name: false
                  show_state: false
                  tap_action:
                    action: toggle
                  styles:
                    card:
                      - width: 40px
                      - height: 40px
                      - border-radius: 50%
                      - padding: 0
                      - box-shadow: none
                      - background: >
                          [[[ return states['light.front_house']?.state === 'on' ? '#feebd6' : '#F3F4F6'; ]]]
                    grid:
                      - display: flex
                      - place-items: center
                  custom_fields:
                    icon: |
                      [[[
                        const isOn = states['light.front_house']?.state === 'on';
                        const iconColor = isOn ? '#f49f10' : '#D1D5DB';
                        const lightbulbOn = '<path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/>';
                        const lightbulbOff = '<path d="M16.8 11.2c.8-.9 1.2-2 1.2-3.2a6 6 0 0 0-9.3-5"/><path d="m2 2 20 20"/><path d="M6.3 6.3a4.67 4.67 0 0 0 1.2 5.2c.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/>';
                        const svgPath = isOn ? lightbulbOn : lightbulbOff;
                        return `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${svgPath}</svg>`;
