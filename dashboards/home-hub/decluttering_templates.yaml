                            content: !include /config/dashboards/popups/day_slot_popup.yaml

      # "Recipe Browser" section header with Add Recipe button
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 1fr auto
          grid-gap: 16px
          margin: 24px 0 8px 0
        card_mod:
          style: |
            ha-card { width: 100%; background: none; box-shadow: none; }
        cards:
          # Section title
          - type: custom:button-card
            show_icon: false
            show_name: false
