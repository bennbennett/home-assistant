home_hub_devices_main:
  card:
    type: vertical-stack
    view_layout:
      grid-column: 2
    card_mod:
      style: |
        :host { padding: 24px 32px; background: #fbfaf9; min-height: calc(100vh - 48px); }
    cards:
      - type: custom:button-card
        template: home_hub_header
        icon: mdi:devices
        name: Devices

      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: repeat(4, auto) 1fr
          grid-gap: 8px
        cards:
          - type: custom:button-card
            template: home_hub_filter_pill
            icon: mdi:archive-outline
            name: All
            entity: input_boolean.device_filter_all
            tap_action:
              action: call-service
              service: script.toggle_device_filter_all

          - type: custom:button-card
            template: home_hub_filter_pill
            icon: mdi:cellphone
            name: Phones
            entity: input_boolean.device_filter_phones
            tap_action:
              action: call-service
              service: script.toggle_device_filter_phones

          - type: custom:button-card
            template: home_hub_filter_pill
            icon: mdi:tablet-ipad
            name: Tablets
            entity: input_boolean.device_filter_tablets
            tap_action:
              action: call-service
              service: script.toggle_device_filter_tablets

          - type: custom:button-card
            template: home_hub_filter_pill
            icon: mdi:desktop-tower-monitor
            name: Computer
            entity: input_boolean.device_filter_computer
            tap_action:
              action: call-service
              service: script.toggle_device_filter_computer

      - type: grid
        columns: 3
        square: false
        card_mod:
          style: |
            ha-card { background: none; box-shadow: none; margin-top: 24px; }
        cards:
          # iPhone
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - entity: input_boolean.device_filter_all
                    state: "on"
                  - entity: input_boolean.device_filter_phones
                    state: "on"
            card:
              type: custom:button-card
              template: home_hub_device_card
              entity: device_tracker.iphone
              variables:
                name: iPhone
                icon: mdi:cellphone
                device_color: '#C87456'
                battery_entity: sensor.iphone_battery_level
              tap_action:
                action: fire-dom-event
                browser_mod:
                  service: browser_mod.popup
                  data:
                    title: iPhone
                    content:
                      type: vertical-stack
                      cards:
                        # Header Section
                        - type: custom:button-card
                          show_icon: false
                          show_name: false
                          styles:
                            card: [background: none, box-shadow: none, border: none, padding: 0]
                            grid:
                              - grid-template-areas: '"icon title"'
                              - grid-template-columns: 80px 1fr
                            custom_fields:
                              icon: [justify-self: start]
                              title: [justify-self: start, align-self: center]
                          custom_fields:
                            icon: |
                              [[[
                                return `<div style=\"width: 64px; height: 64px; background: #f8f8f6; border-radius: 16px; display: flex; align-items: center; justify-content: center;\">
                                  <ha-icon icon=\"mdi:cellphone\" style=\"--mdc-icon-size: 32px; color: #C87456;\"></ha-icon>
                                </div>`;
                              ]]]
                            title: |
                              [[[
                                return `<div style=\"display: flex; flex-direction: column;\">
                                  <div style=\"font-size: 24px; font-weight: 600; color: #1F2937;\">iPhone</div>
                                  <div style=\"font-size: 16px; color: #9CA3AF;\">Online</div>
                                </div>`;
                              ]]]

                        # Battery Section
                        - type: custom:button-card
                          entity: sensor.iphone_battery_level
                          show_name: false
                          show_icon: false
                          styles:
                            card: [background: none, box-shadow: none, border: none, padding: "24px 0 0 0"]
                            custom_fields:
                              bar: [width: 100%]
                          custom_fields:
                            bar: |
                              [[[
                                const val = entity.state;
                                return `<div style=\"display: flex; flex-direction: column; gap: 8px;\">
                                  <div style=\"display: flex; justify-content: space-between; align-items: center;\">
                                    <div style=\"display: flex; align-items: center; gap: 8px; font-size: 16px; color: #1F2937;\">
                                      <ha-icon icon=\"mdi:battery\" style=\"--mdc-icon-size: 20px; color: #4A7C59;\"></ha-icon>
                                      <span>Battery</span>
                                    </div>
                                    <div style=\"font-size: 16px; color: #4A7C59; font-weight: 500;\">${val}%</div>
                                  </div>
                                  <div style=\"width: 100%; height: 8px; background: #f2f1ed; border-radius: 4px; overflow: hidden;\">
                                    <div style=\"width: ${val}%; height: 100%; background: #4A7C59;\"></div>
                                  </div>
                                </div>`;
                              ]]]

