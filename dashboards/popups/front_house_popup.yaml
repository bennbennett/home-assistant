type: custom:mod-card
card_mod:
  style: |
    ha-card {
      background: #fdfcf8;
      border-radius: 24px;
      padding: 20px 24px 24px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      border: 1px solid #eceae4;
    }
card:
  type: vertical-stack
  cards:
    - type: custom:button-card
      entity: sensor.living_room_temp_temperature
      show_icon: false
      show_state: false
      show_name: true
      name: Front House
      styles:
        card:
          - background: none
          - box-shadow: none
          - padding: 8px 0 6px 0
        grid:
          - grid-template-areas: '"icon name" "icon temp"'
          - grid-template-columns: 64px 1fr
          - grid-template-rows: min-content min-content
          - column-gap: 16px
        name:
          - font-size: 24px
          - font-weight: 600
          - color: '#1F2937'
          - align-self: end
        custom_fields:
          icon:
            - align-self: start
          temp:
            - font-size: 16px
            - color: '#6B7280'
            - align-self: start
      custom_fields:
        icon: |
          [[[
            return `
              <div style="width: 56px; height: 56px; border-radius: 18px; background: #f1f3f0; display: flex; align-items: center; justify-content: center;">
                <ha-icon icon="mdi:home-outline" style="--mdc-icon-size: 28px; color: #4A7C59;"></ha-icon>
              </div>
            `;
          ]]]
        temp: |
          [[[
            const value = states['sensor.living_room_temp_temperature']?.state;
            const temp = value ? `${Number(value).toFixed(1)}°F` : '--';
            return `Currently ${temp}`;
          ]]]

    - type: custom:button-card
      show_icon: false
      show_name: true
      name: Lighting
      styles:
        card:
          - background: none
          - box-shadow: none
          - padding: 10px 0 2px 0
        name:
          - font-size: 16px
          - font-weight: 600
          - color: '#1F2937'
          - justify-self: start

    - type: custom:mushroom-light-card
      entity: light.front_house
      name: Front House
      icon: mdi:lightbulb-on-outline
      show_brightness_control: true
      show_color_temp_control: false
      use_light_color: false
      layout: horizontal
      card_mod:
        style: |
          ha-card {
            --mushroom-accent-color: #4A7C59;
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #eceae4;
            box-shadow: none;
            margin: 6px 0;
          }

    - type: custom:mushroom-light-card
      entity: light.living_room_color
      name: Living Room Lamp
      icon: mdi:lamp
      show_brightness_control: true
      show_color_temp_control: false
      use_light_color: false
      layout: horizontal
      card_mod:
        style: |
          ha-card {
            --mushroom-accent-color: #4A7C59;
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #eceae4;
            box-shadow: none;
            margin: 6px 0;
          }

    - type: custom:mushroom-light-card
      entity: light.extended_color_light_1
      name: Bookshelf Light
      icon: mdi:led-strip-variant
      show_brightness_control: true
      show_color_temp_control: false
      use_light_color: false
      layout: horizontal
      card_mod:
        style: |
          ha-card {
            --mushroom-accent-color: #4A7C59;
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #eceae4;
            box-shadow: none;
            margin: 6px 0 10px 0;
          }

    - type: horizontal-stack
      cards:
        - type: custom:button-card
          template: home_hub_scene_button
          icon: mdi:white-balance-sunny
          name: Relax
          variables:
            scene_color: '#4A7C59'
          tap_action:
            action: call-service
            service: scene.turn_on
            service_data:
              entity_id: scene.front_house_relax

        - type: custom:button-card
          template: home_hub_scene_button
          icon: mdi:lightning-bolt
          name: Energize
          variables:
            scene_color: '#4A7C59'
          tap_action:
            action: call-service
            service: scene.turn_on
            service_data:
              entity_id: scene.front_house_energize

        - type: custom:button-card
          template: home_hub_scene_button
          icon: mdi:weather-night
          name: Night
          variables:
            scene_color: '#4A7C59'
          tap_action:
            action: call-service
            service: scene.turn_on
            service_data:
              entity_id: scene.front_house_nightlight
