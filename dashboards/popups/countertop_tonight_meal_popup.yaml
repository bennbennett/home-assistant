            - font-weight: 600
            - color: '#1F2937'
            - white-space: normal
            - line-height: 1.2
            - text-align: center

  - type: custom:button-card
    entity: sensor.mealie_weekly_meal_plan
    show_icon: false
    show_name: false
    show_state: false
    tap_action:
      action: none
    triggers_update:
      - sensor.mealie_weekly_meal_plan
    styles:
      card:
        - background: none
        - border: none
        - box-shadow: none
        - padding: 14px 4px 0 4px
        - display: |
            [[[
              const meals = (entity && entity.attributes && Array.isArray(entity.attributes.meals)) ? entity.attributes.meals : [];
              const todayIso = new Date().toISOString().split('T')[0];
              const past = [];
              meals.forEach((meal) => {
                if (!meal || !meal.date || !meal.recipe_name || meal.recipe_name === '__HA_CLEARED__') return;
                if (meal.date < todayIso && past.indexOf(meal.recipe_name) === -1) past.push(meal.recipe_name);
              });
              return past.length ? 'block' : 'none';
            ]]]
      grid:
        - grid-template-areas: '"done"'
      custom_fields:
        done:
          - text-align: left
    custom_fields:
      done: |
        [[[
          const meals = (entity && entity.attributes && Array.isArray(entity.attributes.meals)) ? entity.attributes.meals : [];
          const todayIso = new Date().toISOString().split('T')[0];
          const past = [];
          meals.forEach((meal) => {
            if (!meal || !meal.date || !meal.recipe_name || meal.recipe_name === '__HA_CLEARED__') return;
            if (meal.date < todayIso && past.indexOf(meal.recipe_name) === -1) past.push(meal.recipe_name);
          });
          const done = past.slice(-4).reverse();
          return '<div style="font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#9CA3AF;margin-bottom:8px;">Done this week</div><div style="display:flex;flex-wrap:wrap;gap:8px;">' + done.map((meal) => '<span style="font-size:14px;color:#9CA3AF;text-decoration:line-through;text-decoration-thickness:1.5px;">' + meal + '</span>').join('') + '</div>';
        ]]]
