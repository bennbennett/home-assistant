type: vertical-stack
cards:
  # Shopping list with built-in check/edit/delete
  - type: todo-list
    entity: todo.mealie_weekly_groceries
    card_mod:
      style: |
        ha-card {
          box-shadow: none;
          border: 1px solid #E5E7EB;
          border-radius: 12px;
          max-height: 400px;
          overflow-y: auto;
        }

  # Action buttons
  - type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: repeat(3, max-content)
      grid-gap: 8px
      justify-content: center
      margin-top: 16px
    card_mod:
      style: |
        ha-card { width: 100%; background: none; box-shadow: none; }
    cards:
      # Close
      - type: custom:button-card
        name: Close
        icon: mdi:close
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.close_popup
        styles:
          card:
            - border-radius: 12px
            - padding: 8px 12px
            - margin: 4px
            - width: 140px
            - background-color: rgb(243, 244, 246)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: min-content 1fr
          icon:
            - width: 20px
            - height: 20px
            - color: rgb(107, 114, 128)
          name:
            - color: rgb(107, 114, 128)
            - font-size: 14px
            - margin-left: 8px

      # Clear All
      - type: custom:button-card
        name: Clear All
        icon: mdi:delete-sweep-outline
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.sequence
            data:
              sequence:
                - service: script.clear_weekly_groceries
        styles:
          card:
            - border-radius: 12px
            - padding: 8px 12px
            - margin: 4px
            - width: 140px
            - background-color: rgb(254, 226, 226)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: min-content 1fr
          icon:
            - width: 20px
            - height: 20px
            - color: rgb(220, 38, 38)
          name:
            - color: rgb(220, 38, 38)
            - font-size: 14px
            - margin-left: 8px

      # Send to Keep
      - type: custom:button-card
        name: Send to Keep
        icon: mdi:google
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.sequence
            data:
              sequence:
                - service: input_button.press
                  data:
                    entity_id: input_button.sync_shopping_list
                - service: browser_mod.close_popup
        styles:
          card:
            - border-radius: 12px
            - padding: 8px 12px
            - margin: 4px
            - width: 140px
            - background-color: rgb(220, 252, 231)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: min-content 1fr
          icon:
            - width: 20px
            - height: 20px
            - color: rgb(22, 163, 74)
          name:
            - color: rgb(22, 163, 74)
            - font-size: 14px
            - margin-left: 8px
