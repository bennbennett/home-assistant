type: vertical-stack
card_mod:
  style: |
    :host {
      width: 50vw;
      max-width: 50vw;
      margin: 0 auto;
    }
cards:
  # Calendar selection as clickable pills (centered via layout-card)
  - type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: 1fr max-content max-content 1fr
      grid-gap: 4px
    card_mod:
      style: |
        ha-card { width: 100%; background: none; box-shadow: none; }
    cards:
      - type: custom:button-card
        entity: input_select.calendar_selector
        triggers_update:
          - input_select.calendar_selector
        name: Home Calendar
        icon: mdi:home
        view_layout:
          grid-column: 2
        tap_action:
          action: call-service
          service: input_select.select_option
          target:
            entity_id: input_select.calendar_selector
          data:
            option: "Home Calendar"
        styles:
          card:
            - border-radius: 12px
            - padding: 8px 12px
            - margin: 4px
            - width: 160px
            - background-color: rgba(74, 124, 89, 0.1)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: min-content 1fr
          icon:
            - width: 20px
            - height: 20px
            - color: rgba(74, 124, 89, 0.7)
          name:
            - color: rgba(74, 124, 89, 0.7)
            - font-size: 14px
            - margin-left: 8px
        state:
          - value: "Home Calendar"
            styles:
              card:
                - background-color: rgba(74, 124, 89, 0.2)
              icon:
                - color: '#4A7C59'
              name:
                - color: '#4A7C59'
      - type: custom:button-card
        entity: input_select.calendar_selector
        triggers_update:
          - input_select.calendar_selector
        name: Birthdays & Anniversaries
        icon: mdi:cake-variant
        view_layout:
          grid-column: 3
        tap_action:
          action: call-service
          service: input_select.select_option
          target:
            entity_id: input_select.calendar_selector
          data:
            option: "Birthdays & Anniversaries"
        styles:
          card:
            - border-radius: 12px
            - padding: 8px 12px
            - margin: 4px
            - width: 220px
            - background-color: rgba(74, 124, 89, 0.1)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: min-content 1fr
          icon:
            - width: 20px
            - height: 20px
            - color: rgba(74, 124, 89, 0.7)
          name:
            - color: rgba(74, 124, 89, 0.7)
            - font-size: 14px
            - margin-left: 8px
        state:
          - value: "Birthdays & Anniversaries"
            styles:
              card:
                - background-color: rgba(74, 124, 89, 0.2)
              icon:
                - color: '#4A7C59'
              name:
                - color: '#4A7C59'

  # Event Details first
  - type: entities
    show_header_toggle: false
    entities:
      - type: section
        label: Event Details
      - entity: input_text.event_title
        name: Event Title
        icon: mdi:text-short

  # Toggle buttons to reveal optional fields (centered via layout-card)
  - type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: 1fr max-content max-content max-content 1fr
      grid-gap: 4px
    card_mod:
      style: |
        ha-card { width: 100%; background: none; box-shadow: none; }
    cards:
      - type: custom:button-card
        entity: input_boolean.event_show_location
        triggers_update:
          - input_boolean.event_show_location
        name: Add Location
        icon: mdi:map-marker
        view_layout:
          grid-column: 2
        tap_action:
          action: call-service
          service: input_boolean.toggle
          target:
            entity_id: input_boolean.event_show_location
        styles:
          card:
            - border-radius: 12px
            - padding: 6px 10px
            - margin: 4px
            - width: 150px
            - background-color: rgba(74, 124, 89, 0.1)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: min-content 1fr
          icon:
            - width: 18px
            - height: 18px
            - color: rgba(74, 124, 89, 0.7)
          name:
            - color: rgba(74, 124, 89, 0.7)
            - font-size: 13px
            - margin-left: 8px
        state:
          - value: 'on'
            styles:
              card:
                - background-color: rgba(74, 124, 89, 0.2)
              icon:
                - color: '#4A7C59'
              name:
                - color: '#4A7C59'
      - type: custom:button-card
        entity: input_boolean.event_show_description
        triggers_update:
          - input_boolean.event_show_description
        name: Add Details
        icon: mdi:text
        view_layout:
          grid-column: 3
        tap_action:
          action: call-service
          service: input_boolean.toggle
          target:
            entity_id: input_boolean.event_show_description
        styles:
          card:
            - border-radius: 12px
            - padding: 6px 10px
            - margin: 4px
            - width: 140px
            - background-color: rgba(74, 124, 89, 0.1)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: min-content 1fr
          icon:
            - width: 18px
            - height: 18px
            - color: rgba(74, 124, 89, 0.7)
          name:
            - color: rgba(74, 124, 89, 0.7)
            - font-size: 13px
            - margin-left: 8px
        state:
          - value: 'on'
            styles:
              card:
                - background-color: rgba(74, 124, 89, 0.2)
              icon:
                - color: '#4A7C59'
              name:
                - color: '#4A7C59'
      - type: custom:button-card
        entity: input_boolean.event_set_end_time
        triggers_update:
          - input_boolean.event_set_end_time
        name: Custom End Time
        icon: mdi:clock-plus
        view_layout:
          grid-column: 4
        tap_action:
          action: call-service
          service: input_boolean.toggle
          target:
            entity_id: input_boolean.event_set_end_time
        styles:
          card:
            - border-radius: 12px
            - padding: 6px 10px
            - margin: 4px
            - width: 160px
            - background-color: rgba(74, 124, 89, 0.1)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: min-content 1fr
          icon:
            - width: 18px
            - height: 18px
            - color: rgba(74, 124, 89, 0.7)
          name:
            - color: rgba(74, 124, 89, 0.7)
            - font-size: 13px
            - margin-left: 8px
        state:
          - value: 'on'
            styles:
              card:
                - background-color: rgba(74, 124, 89, 0.2)
              icon:
                - color: '#4A7C59'
              name:
                - color: '#4A7C59'

  # Conditional optional fields
  - type: conditional
    conditions:
      - entity: input_boolean.event_show_location
        state: 'on'
    card:
      type: entities
      entities:
        - entity: input_text.event_location
          name: Location
          icon: mdi:map-marker
  - type: conditional
    conditions:
      - entity: input_boolean.event_show_description
        state: 'on'
    card:
      type: entities
      entities:
        - entity: input_text.event_description
          name: Description
          icon: mdi:text

  # Date & time (Start first)
  - type: entities
    entities:
      - type: section
        label: Event Date & Time
      - entity: input_datetime.event_start
        name: Start Date & Time
        icon: mdi:calendar-start

  # Optional explicit end time (shows before All Day toggle)
  - type: conditional
    conditions:
      - entity: input_boolean.event_set_end_time
        state: "on"
      - entity: input_boolean.event_all_day
        state: "off"
    card:
      type: entities
      entities:
        - entity: input_datetime.event_end
          name: End Date & Time
          icon: mdi:calendar-end

  # All Day toggle (after end time)
  - type: entities
    show_header_toggle: false
    card_mod:
      style: |
        ha-card { background: none; box-shadow: none; }
    entities:
      - entity: input_boolean.event_all_day
        name: All Day Event
        icon: mdi:calendar-clock

  # Action buttons - centered via layout-card; Cancel = red, Create = green
  - type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: 1fr max-content max-content 1fr
      grid-gap: 8px
    card_mod:
      style: |
        ha-card { width: 100%; background: none; box-shadow: none; }
    cards:
      - type: custom:button-card
        name: Cancel
        icon: mdi:close
        view_layout:
          grid-column: 2
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.close_popup
        styles:
          card:
            - border-radius: 12px
            - padding: 8px 12px
            - margin: 4px
            - width: 140px
            - background-color: rgb(254, 226, 226)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: min-content 1fr
          icon:
            - width: 20px
            - height: 20px
            - color: rgb(220, 38, 38)
          name:
            - color: rgb(220, 38, 38)
            - font-size: 14px
            - margin-left: 8px

      - type: custom:button-card
        name: Create Event
        icon: mdi:calendar-plus
        view_layout:
          grid-column: 3
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.sequence
            data:
              sequence:
                - service: script.create_calendar_popup_event
                - service: browser_mod.close_popup
        confirmation:
          text: Create this calendar event?
        styles:
          card:
            - border-radius: 12px
            - padding: 8px 12px
            - margin: 4px
            - width: 140px
            - background-color: rgba(74, 124, 89, 0.15)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: min-content 1fr
          icon:
            - width: 20px
            - height: 20px
            - color: '#4A7C59'
          name:
            - color: '#4A7C59'
            - font-size: 14px
            - margin-left: 8px
