type: vertical-stack
cards:
  # URL input
  - type: entities
    show_header_toggle: false
    entities:
      - type: section
        label: Import Recipe from URL
      - entity: input_text.recipe_import_url
        name: Recipe URL
        icon: mdi:link

  # Action buttons - Cancel and Import
  - type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: 1fr max-content max-content 1fr
      grid-gap: 8px
    card_mod:
      style: |
        ha-card { width: 100%; background: none; box-shadow: none; }
    cards:
      - type: custom:button-card
        name: Cancel
        icon: mdi:close
        view_layout:
          grid-column: 2
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.close_popup
        styles:
          card:
            - border-radius: 12px
            - padding: 8px 12px
            - margin: 4px
            - width: 140px
            - background-color: rgb(254, 226, 226)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: min-content 1fr
          icon:
            - width: 20px
            - height: 20px
            - color: rgb(220, 38, 38)
          name:
            - color: rgb(220, 38, 38)
            - font-size: 14px
            - margin-left: 8px

      - type: custom:button-card
        name: Import
        icon: mdi:import
        view_layout:
          grid-column: 3
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.sequence
            data:
              sequence:
                - service: script.import_recipe_from_url
                - service: browser_mod.close_popup
        styles:
          card:
            - border-radius: 12px
            - padding: 8px 12px
            - margin: 4px
            - width: 140px
            - background-color: rgb(220, 252, 231)
          grid:
            - grid-template-areas: '"i n"'
            - grid-template-columns: min-content 1fr
          icon:
            - width: 20px
            - height: 20px
            - color: rgb(22, 163, 74)
          name:
            - color: rgb(22, 163, 74)
            - font-size: 14px
            - margin-left: 8px
