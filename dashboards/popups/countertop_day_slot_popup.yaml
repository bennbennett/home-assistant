##############################################################################
#  Countertop — Day Slot Popup                                               #
#  Opens when a day card on /the-countertop/meals is tapped. Shows the day's #
#  current meal and a 2x3 grid of recipe cards; tapping a recipe replaces    #
#  that day's dinner in Mealie. A Remove Meal pill appears if the day has    #
#  an assignment.                                                            #
#                                                                            #
#  The day is passed in via input_select.meal_day_selector — the caller MUST #
#  set that selector before opening this popup.                              #
##############################################################################
type: vertical-stack
card_mod:
  style: |
    ha-card {
      border: none !important;
      box-shadow: none !important;
      background: none !important;
    }
cards:
  # ── Title: "DAY, Apr 24" — rendered server-side via Jinja ──
  # The title, banner, and Remove-Meal pill all read input_select state.
  # Using button-card [[[ ]]] templates caused a race: the popup's content
  # evaluated before HA's input_select.select_option propagated to the
  # browser's hass.states, so the title would show the *previous* day.
  # Jinja runs server-side at the moment of the browser_mod.popup service
  # call — after the sequence's earlier input_select.select_option has
  # committed — so the value is always current.
  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    tap_action:
      action: none
    styles:
      card:
        - background: none
        - border: none
        - box-shadow: none
        - padding: 4px 4px 0 4px
      grid:
        - grid-template-areas: '"title"'
      custom_fields:
        title:
          - text-align: left
    custom_fields:
      title: >-
        {% set day = states('input_select.meal_day_selector') %}
        {% set days_map = {'Monday': 0, 'Tuesday': 1, 'Wednesday': 2, 'Thursday': 3, 'Friday': 4, 'Saturday': 5, 'Sunday': 6} %}
        {% set day_idx = days_map.get(day, 0) %}
        {% set monday = (now() - timedelta(days=now().weekday())).date() %}
        {% set target = monday + timedelta(days=day_idx) %}
        <div style="font-family:Fraunces,Georgia,serif;font-size:22px;font-weight:400;color:#1F2937;line-height:1.15;">{{ day }}<span style="color:#9CA3AF;font-weight:400;">, {{ target.strftime('%b %-d') }}</span></div>

  # ── Current meal banner — rendered server-side via Jinja ──
  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    tap_action:
      action: none
    styles:
      card:
        - background: white
        - border-radius: 18px
        - border: 1px solid '#E8E4DE'
        - box-shadow: none
        - padding: 14px 16px
        - margin: 10px 4px 0 4px
      grid:
        - grid-template-areas: '"summary"'
      custom_fields:
        summary:
          - text-align: left
    custom_fields:
      summary: >-
        {% set day = states('input_select.meal_day_selector') %}
        {% set days_map = {'Monday': 0, 'Tuesday': 1, 'Wednesday': 2, 'Thursday': 3, 'Friday': 4, 'Saturday': 5, 'Sunday': 6} %}
        {% set day_idx = days_map.get(day, 0) %}
        {% set monday = (now() - timedelta(days=now().weekday())).date() %}
        {% set target = monday + timedelta(days=day_idx) %}
        {% set target_str = target.strftime('%Y-%m-%d') %}
        {% set today_str = now().strftime('%Y-%m-%d') %}
        {% set is_today = target_str == today_str %}
        {% set meals = state_attr('sensor.mealie_weekly_meal_plan', 'meals') or [] %}
        {% set ns = namespace(match='') %}
        {% for m in meals %}{% if m.date == target_str and m.recipe_name %}{% set ns.match = m.recipe_name %}{% endif %}{% endfor %}
        {% if ns.match %}
        <div style="font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:{{ '#C87456' if is_today else '#6B7280' }};margin-bottom:6px;">{{ 'Tonight' if is_today else 'Planned' }}</div><div style="font-family:Fraunces,Georgia,serif;font-size:22px;font-weight:400;color:#1F2937;line-height:1.2;">{{ ns.match }}</div>
        {% else %}
        <div style="font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#9CA3AF;margin-bottom:6px;">Not planned</div><div style="font-family:Fraunces,Georgia,serif;font-size:20px;font-weight:400;color:#9CA3AF;line-height:1.2;font-style:italic;">Pick a recipe below</div>
        {% endif %}

  # ── Recipe picker: 2x3 grid ──
  - type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr
      grid-gap: 10px
      margin: 12px 4px 0 4px
    cards:
      - type: custom:button-card
        entity: sensor.mealie_recipe_browser
        triggers_update:
          - sensor.mealie_recipe_browser
        show_icon: false
        show_state: false
        name: |
          [[[
            const sensor = states['sensor.mealie_recipe_browser'];
            const items = (sensor && sensor.attributes && sensor.attributes.items) || [];
            return items[0] ? items[0].name : '—';
          ]]]
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.sequence
            data:
              sequence:
                - service: script.ct_assign_recipe_by_index_to_selected_day
                  data:
                    index: 0
                - service: browser_mod.close_popup
        styles:
          card:
            - background: '#F9FAFB'
            - border: 1px solid '#E8E4DE'
            - border-radius: 14px
            - padding: 14px
            - height: 64px
            - box-shadow: none
          name:
            - font-size: 14px
            - font-weight: 600
            - color: '#1F2937'
            - white-space: normal
            - line-height: 1.2
            - text-align: center

      - type: custom:button-card
        entity: sensor.mealie_recipe_browser
        triggers_update:
          - sensor.mealie_recipe_browser
        show_icon: false
        show_state: false
        name: |
          [[[
            const sensor = states['sensor.mealie_recipe_browser'];
            const items = (sensor && sensor.attributes && sensor.attributes.items) || [];
            return items[1] ? items[1].name : '—';
          ]]]
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.sequence
            data:
              sequence:
                - service: script.ct_assign_recipe_by_index_to_selected_day
                  data:
                    index: 1
                - service: browser_mod.close_popup
        styles:
          card:
            - background: '#F9FAFB'
            - border: 1px solid '#E8E4DE'
            - border-radius: 14px
            - padding: 14px
            - height: 64px
            - box-shadow: none
          name:
            - font-size: 14px
            - font-weight: 600
            - color: '#1F2937'
            - white-space: normal
            - line-height: 1.2
            - text-align: center

      - type: custom:button-card
        entity: sensor.mealie_recipe_browser
        triggers_update:
          - sensor.mealie_recipe_browser
        show_icon: false
        show_state: false
        name: |
          [[[
            const sensor = states['sensor.mealie_recipe_browser'];
            const items = (sensor && sensor.attributes && sensor.attributes.items) || [];
            return items[2] ? items[2].name : '—';
          ]]]
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.sequence
            data:
              sequence:
                - service: script.ct_assign_recipe_by_index_to_selected_day
                  data:
                    index: 2
                - service: browser_mod.close_popup
        styles:
          card:
            - background: '#F9FAFB'
            - border: 1px solid '#E8E4DE'
            - border-radius: 14px
            - padding: 14px
            - height: 64px
            - box-shadow: none
          name:
            - font-size: 14px
            - font-weight: 600
            - color: '#1F2937'
            - white-space: normal
            - line-height: 1.2
            - text-align: center

      - type: custom:button-card
        entity: sensor.mealie_recipe_browser
        triggers_update:
          - sensor.mealie_recipe_browser
        show_icon: false
        show_state: false
        name: |
          [[[
            const sensor = states['sensor.mealie_recipe_browser'];
            const items = (sensor && sensor.attributes && sensor.attributes.items) || [];
            return items[3] ? items[3].name : '—';
          ]]]
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.sequence
            data:
              sequence:
                - service: script.ct_assign_recipe_by_index_to_selected_day
                  data:
                    index: 3
                - service: browser_mod.close_popup
        styles:
          card:
            - background: '#F9FAFB'
            - border: 1px solid '#E8E4DE'
            - border-radius: 14px
            - padding: 14px
            - height: 64px
            - box-shadow: none
          name:
            - font-size: 14px
            - font-weight: 600
            - color: '#1F2937'
            - white-space: normal
            - line-height: 1.2
            - text-align: center

      - type: custom:button-card
        entity: sensor.mealie_recipe_browser
        triggers_update:
          - sensor.mealie_recipe_browser
        show_icon: false
        show_state: false
        name: |
          [[[
            const sensor = states['sensor.mealie_recipe_browser'];
            const items = (sensor && sensor.attributes && sensor.attributes.items) || [];
            return items[4] ? items[4].name : '—';
          ]]]
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.sequence
            data:
              sequence:
                - service: script.ct_assign_recipe_by_index_to_selected_day
                  data:
                    index: 4
                - service: browser_mod.close_popup
        styles:
          card:
            - background: '#F9FAFB'
            - border: 1px solid '#E8E4DE'
            - border-radius: 14px
            - padding: 14px
            - height: 64px
            - box-shadow: none
          name:
            - font-size: 14px
            - font-weight: 600
            - color: '#1F2937'
            - white-space: normal
            - line-height: 1.2
            - text-align: center

      - type: custom:button-card
        entity: sensor.mealie_recipe_browser
        triggers_update:
          - sensor.mealie_recipe_browser
        show_icon: false
        show_state: false
        name: |
          [[[
            const sensor = states['sensor.mealie_recipe_browser'];
            const items = (sensor && sensor.attributes && sensor.attributes.items) || [];
            return items[5] ? items[5].name : '—';
          ]]]
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.sequence
            data:
              sequence:
                - service: script.ct_assign_recipe_by_index_to_selected_day
                  data:
                    index: 5
                - service: browser_mod.close_popup
        styles:
          card:
            - background: '#F9FAFB'
            - border: 1px solid '#E8E4DE'
            - border-radius: 14px
            - padding: 14px
            - height: 64px
            - box-shadow: none
          name:
            - font-size: 14px
            - font-weight: 600
            - color: '#1F2937'
            - white-space: normal
            - line-height: 1.2
            - text-align: center

  # ── Remove Meal pill (visible only if the selected day has an assignment) ──
  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    tap_action:
      action: fire-dom-event
      browser_mod:
        service: browser_mod.sequence
        data:
          sequence:
            - service: script.clear_meal_for_day
            - service: browser_mod.close_popup
    styles:
      card:
        - background: none
        - border: none
        - box-shadow: none
        - padding: 14px 4px 4px 4px
        - display: >-
            {% set day = states('input_select.meal_day_selector') %}
            {% set days_map = {'Monday': 0, 'Tuesday': 1, 'Wednesday': 2, 'Thursday': 3, 'Friday': 4, 'Saturday': 5, 'Sunday': 6} %}
            {% set day_idx = days_map.get(day, 0) %}
            {% set monday = (now() - timedelta(days=now().weekday())).date() %}
            {% set target_str = (monday + timedelta(days=day_idx)).strftime('%Y-%m-%d') %}
            {% set meals = state_attr('sensor.mealie_weekly_meal_plan', 'meals') or [] %}
            {% set ns = namespace(has=false) %}
            {% for m in meals %}{% if m.date == target_str and m.recipe_name %}{% set ns.has = true %}{% endif %}{% endfor %}
            {{ 'block' if ns.has else 'none' }}
      grid:
        - grid-template-areas: '"pill"'
      custom_fields:
        pill:
          - text-align: center
    custom_fields:
      pill: >-
        <div style="display:inline-flex;align-items:center;gap:8px;padding:10px 18px;background:#FEF2F2;border:1px solid #FECACA;border-radius:24px;color:#B91C1C;font-size:14px;font-weight:600;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#B91C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg><span>Remove Meal</span></div>
