  # ── Preset row 2: 45m centered ──
  - type: custom:button-card
    name: "45m"
    show_icon: false
    tap_action:
      action: call-service
      service: timer.start
      service_data:
        entity_id: timer.kitchen_timer
        duration: "00:45:00"
    styles:
      card:
        - height: 40px
        - border-radius: 10px
        - border: 1px solid #E5E7EB
        - background: white
        - box-shadow: none
        - padding: 0
        - max-width: 64px
        - margin: 4px auto 0
      name:
        - font-size: 14px
        - font-weight: 600
        - color: '#374151'

  - type: conditional
    conditions:
      - entity: timer.kitchen_timer
        state_not: idle
    card:
      type: horizontal-stack
      cards:
        - type: custom:button-card
          entity: timer.kitchen_timer
          show_icon: false
          name: |
            [[[
              return entity && entity.state === 'paused' ? 'Resume' : 'Pause';
            ]]]
          tap_action:
            action: call-service
            service: |
              [[[
                return entity && entity.state === 'paused' ? 'timer.start' : 'timer.pause';
              ]]]
            service_data:
              entity_id: timer.kitchen_timer
          styles:
            card:
              - height: 44px
              - border-radius: 11px
              - background: '#F3F4F6'
              - border: none
              - box-shadow: none
              - margin-top: 12px
            name:
              - font-size: 15px
              - font-weight: 600
              - color: '#374151'
        - type: custom:button-card
          name: Cancel
          show_icon: false
          tap_action:
            action: call-service
            service: timer.cancel
            service_data:
              entity_id: timer.kitchen_timer
          styles:
            card:
              - height: 44px
              - border-radius: 11px
              - background: '#FFF6F1'
              - border: none
              - box-shadow: none
              - margin-top: 12px
            name:
              - font-size: 15px
              - font-weight: 600
              - color: '#C87456'
