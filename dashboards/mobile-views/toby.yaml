                                    icon: mdi:food-apple
                              
                              # Progress indicator
                              - type: custom:button-card
                                name: >
                                  [[[ 
                                    const total = 8;
                                    const entities = [
                                      'hockey_1', 'hockey_2', 'hockey_3', 'hockey_4',
                                      'hockey_5', 'hockey_6', 'hockey_7', 'hockey_8'
