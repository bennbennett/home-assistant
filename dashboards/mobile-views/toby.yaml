# Toby's View
title: Toby
path: toby
panel: true
cards:
  - type: vertical-stack
    cards:
      - type: custom:decluttering-card
        template: mobile_top_nav
      - type: custom:decluttering-card
        template: mobile_container
        variables:
          - cards:
              # Activities Grid
              - type: grid
                columns: 2
                square: false
                cards:
                  # Swimming Card
                  - type: custom:button-card
                    name: Swimming
                    icon: mdi:pool
                    template: mobile_room_enhanced
                    variables:
                      bg_color: "#ecfdf5"  # Emerald-50
                      accent_color: "#06b6d4"  # Cyan-500
                    tap_action:
                      action: fire-dom-event
                      browser_mod:
                        service: browser_mod.popup
                        data:
                          title: Swimming Checklist
                          size: normal
                          content:
                            type: vertical-stack
                            cards:
                              - type: markdown
                                content: |
                                  ## Swimming Lesson Checklist
                                  Check off items as you pack them
                                card_mod:
                                  style: |
                                    ha-card {
                                      background: transparent;
                                      box-shadow: none;
                                      padding: 16px 0 8px 0;
                                      margin: 0;
                                    }
                              
                              # Swimming Equipment Section
                              - type: markdown
                                content: |
                                  ### Swimming Equipment
                                card_mod:
                                  style: |
                                    ha-card {
                                      background: transparent;
                                      box-shadow: none;
                                      padding: 8px 0 0 0;
                                      margin: 0;
                                    }
                              - type: entities
                                show_header_toggle: false
                                entities:
                                  - entity: input_boolean.swimming_bag
                                    name: Swim bag
                                    icon: mdi:bag-carry-on
                                  - entity: input_boolean.swimming_shirt
                                    name: Swim shirt
                                    icon: mdi:tshirt-crew
                                  - entity: input_boolean.swimming_trunks
                                    name: Swim trunks
                                    icon: mdi:swim
                                  - entity: input_boolean.swimming_goggles
                                    name: Goggles
                                    icon: mdi:glasses
                                  - entity: input_boolean.swimming_towel
                                    name: Towel
                                    icon: mdi:paper-roll
                                  - entity: input_boolean.swimming_sunscreen
                                    name: Sunscreen
                                    icon: mdi:sun-thermometer
                                  - entity: input_boolean.swimming_wet_bag
                                    name: Wet clothes bag
                                    icon: mdi:water
                              
                              # Change of Clothes Section
                              - type: markdown
                                content: |
                                  ### Change of Clothes
                                card_mod:
                                  style: |
                                    ha-card {
                                      background: transparent;
                                      box-shadow: none;
                                      padding: 8px 0 0 0;
                                      margin: 0;
                                    }
                              - type: entities
                                show_header_toggle: false
                                entities:
                                  - entity: input_boolean.swimming_underwear
                                    name: Underwear
                                    icon: mdi:underwear-outline
                                  - entity: input_boolean.swimming_shirt_change
                                    name: Shirt
                                    icon: mdi:tshirt-crew-outline
                                  - entity: input_boolean.swimming_shorts
                                    name: Shorts
                                    icon: mdi:human-pants
                              
                              # Food & Drink Section
                              - type: markdown
                                content: |
                                  ### Food & Drink
                                card_mod:
                                  style: |
                                    ha-card {
                                      background: transparent;
                                      box-shadow: none;
                                      padding: 8px 0 0 0;
                                      margin: 0;
                                    }
                              - type: entities
                                show_header_toggle: false
                                entities:
                                  - entity: input_boolean.swimming_water
                                    name: Water bottle
                                    icon: mdi:bottle-water
                                  - entity: input_boolean.swimming_snack
                                    name: Snack
                                    icon: mdi:food-apple
                              
                              # Progress indicator
                              - type: custom:button-card
                                name: >
                                  [[[ 
                                    const total = 12;
                                    const entities = [
                                      'swimming_bag', 'swimming_shirt', 'swimming_trunks', 'swimming_goggles',
                                      'swimming_towel', 'swimming_sunscreen', 'swimming_wet_bag', 'swimming_underwear',
                                      'swimming_shirt_change', 'swimming_shorts', 'swimming_water', 'swimming_snack'
                                    ];
                                    const checked = entities.filter(e => states[`input_boolean.${e}`].state === 'on').length;
                                    return `Progress: ${checked}/${total} items packed`;
                                  ]]]
                                entity: input_boolean.swimming_bag
                                show_icon: true
                                icon: >
                                  [[[ 
                                    const total = 12;
                                    const entities = [
                                      'swimming_bag', 'swimming_shirt', 'swimming_trunks', 'swimming_goggles',
                                      'swimming_towel', 'swimming_sunscreen', 'swimming_wet_bag', 'swimming_underwear',
                                      'swimming_shirt_change', 'swimming_shorts', 'swimming_water', 'swimming_snack'
                                    ];
                                    const checked = entities.filter(e => states[`input_boolean.${e}`].state === 'on').length;
                                    return checked === total ? 'mdi:check-circle' : 'mdi:clipboard-check-outline';
                                  ]]]
                                styles:
                                  card:
                                    - background: "#f0f9ff"
                                    - border-radius: 12px
                                    - padding: 16px
                                  icon:
                                    - color: "#0ea5e9"
                                  name:
                                    - color: "#0c4a6e"
                                    - font-weight: 600

                  # Hockey Card
                  - type: custom:button-card
                    name: Hockey
                    icon: mdi:hockey-sticks
