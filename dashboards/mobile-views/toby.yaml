                                icon: >
                                  [[[ 
                                    const total = 8;
                                    const entities = [
                                      'hockey_1', 'hockey_2', 'hockey_3', 'hockey_4',
                                      'hockey_5', 'hockey_6', 'hockey_7', 'hockey_8'
                                    ];
                                    const checked = entities.filter(e => states[`input_boolean.${e}`].state === 'on').length;
                                    return checked === total ? 'mdi:check-circle' : 'mdi:clipboard-check-outline';
                                  ]]]
                                styles:
                                  card:
                                    - background: "#faf5ff"
                                    - border-radius: 12px
                                    - padding: 16px
                                  icon:
                                    - color: "#8b5cf6"
                                  name:
                                    - color: "#581c87"
                                    - font-weight: 600

