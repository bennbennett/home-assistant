                      const ds = tgt.getFullYear() + '-' + String(tgt.getMonth()+1).padStart(2,'0') + '-' + String(tgt.getDate()).padStart(2,'0');
                      const todayStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
                      const isToday = ds === todayStr;
                      const isPast = ds < todayStr;
                      const match = meals.find(m => m && m.date === ds && m.recipe_name);
                      const forkSvg = '<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3m0 0v7"/>';
