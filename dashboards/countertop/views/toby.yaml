##############################################################################
#  The Countertop — Toby's Corner (Stage 4)                                 #
#  Checklist cards (School, Swimming) + I'm Bored randomizer               #
##############################################################################
title: "Toby's Corner"
path: toby
type: panel
cards:
  - type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: 1fr
      grid-template-rows: auto 1fr auto
      height: 100vh
      margin: 0
      padding: 0
    card_mod:
      style: |
        ha-card {
          background: #fbfaf9 !important;
        }
    cards:
      # ═══ ROW 1: Subview header (pinned top) ═══
      - type: custom:button-card
        view_layout:
          grid-row: 1
        show_icon: false
        show_name: false
        show_state: false
        tap_action:
          action: navigate
          navigation_path: /the-countertop/home
        card_mod:
          style: |
            ha-card:active { opacity: 0.7; }
        styles:
          card:
            - background: none
            - box-shadow: none
            - border: none
            - padding: 16px 24px 12px
          grid:
            - grid-template-areas: '"sv_hdr"'
            - grid-template-columns: 1fr
          custom_fields:
            sv_hdr:
              - display: flex
              - align-items: center
              - gap: 14px
        custom_fields:
          sv_hdr: |
            [[[
              return `<div style="width: 36px; height: 36px; border-radius: 10px; border: 1px solid #E5E7EB; background: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4B5563" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
              </div>
              <div style="font-family: 'Fraunces', Georgia, serif; font-size: 26px; font-weight: 400; color: #1F2937;">Toby's Corner</div>`;
            ]]]

      # ═══ ROW 2: Content (vertically centered in remaining space) ═══
      - type: vertical-stack
        view_layout:
          grid-row: 2
        cards:

          # ── CHECKLISTS label + MANAGE button (same line) ──
          - type: custom:button-card
            show_icon: false
            show_name: false
            show_state: false
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  title: ""
                  size: narrow
                  popup_styles:
                    - style: all
                      styles: |
                        ha-dialog {
                          --ha-dialog-border-radius: 24px;
                        }
                        ha-dialog-header {
                          display: none;
                        }
                  content:
                    type: vertical-stack
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                          background: none !important;
                        }
                    cards:
                      - type: custom:button-card
                        show_icon: false
                        show_name: false
                        show_state: false
                        tap_action:
                          action: none
                        styles:
                          card:
                            - background: none
                            - border: none
                            - box-shadow: none
                            - padding: 4px 0 10px
                          grid:
                            - grid-template-areas: '"title close"'
                            - grid-template-columns: 1fr auto
                          custom_fields:
                            title:
                              - text-align: left
                              - align-self: center
                            close:
                              - justify-self: end
                              - align-self: center
                        custom_fields:
                          title: |
                            [[[
                              return '<div style="font-family:Fraunces,Georgia,serif;font-size:20px;font-weight:400;color:#1F2937;">Manage Checklists</div>';
                            ]]]
                          close: |
                            [[[
                              return '<div onclick="(function(e){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();function f(n){for(var c of n.children||[]){if(c.tagName===\'WA-DIALOG\')return c;var r=f(c)||(c.shadowRoot&&f(c.shadowRoot));if(r)return r;}return null;}var d=f(document);if(d&&d.requestClose)d.requestClose(\'close\');})(event)" '
                                + 'onmousedown="(function(e){e.stopPropagation();})(event)" '
                                + 'ontouchstart="(function(e){e.stopPropagation();})(event)" '
                                + 'style="width:30px;height:30px;border-radius:50%;background:#F3F4F6;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#6B7280;pointer-events:auto;">'
                                + '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>'
                                + '</div>';
                            ]]]
                      - type: entities
                        entities:
                          - entity: input_boolean.season_school
                            name: School
                            icon: mdi:book-open-variant
                          - entity: input_boolean.season_swimming
                            name: Swimming
                            icon: mdi:swim
                          - entity: input_boolean.season_hockey
                            name: Hockey
                            icon: mdi:hockey-sticks
                        card_mod:
                          style: |
                            ha-card {
                              border: none !important;
                              box-shadow: none !important;
                              background: white !important;
                              border-radius: 18px !important;
                            }
            styles:
              card:
                - background: none
                - box-shadow: none
                - border: none
                - padding: 0 24px 8px
              grid:
                - grid-template-areas: '"cl_hdr"'
                - grid-template-columns: 1fr
              custom_fields:
                cl_hdr:
                  - display: flex
                  - align-items: center
                  - gap: 12px
            custom_fields:
              cl_hdr: |
                [[[
                  return '<span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#9CA3AF">Checklists</span><span style="font-size:12px;font-weight:600;color:#4A7C59;cursor:pointer">Manage</span>';
                ]]]

          # ── Checklist Cards ──
          - type: custom:layout-card
            layout_type: custom:grid-layout
            layout:
              grid-template-columns: repeat(auto-fit, minmax(280px, 1fr))
              grid-gap: 16px
              padding: 0 24px
              margin: 0
            cards:
              # School
              - type: conditional
                conditions:
                  - entity: input_boolean.season_school
                    state: "on"
                card:
                  type: custom:button-card
                  template: ct_checklist_card
                  variables:
                    checklist_name: School
                    checklist_icon: book
                    checklist_color: '#4A7C59'
                    checklist_items: "input_boolean.school_snack,input_boolean.school_lunch,input_boolean.school_water,input_boolean.school_jacket,input_boolean.school_binder,input_boolean.school_chromebook,input_boolean.school_homework"
                  tap_action:
                    action: fire-dom-event
                    browser_mod:
                      service: browser_mod.popup
                      data:
                        title: ""
                        size: narrow
                        popup_styles:
                          - style: all
                            styles: |
                              ha-dialog {
                                --ha-dialog-border-radius: 24px;
                              }
                              ha-dialog-header {
                                display: none;
                              }
                        content:
                          type: vertical-stack
                          card_mod:
                            style: |
                              ha-card { border: none !important; box-shadow: none !important; background: none !important; }
                          cards:
                            - type: custom:button-card
                              show_icon: false
                              show_name: false
                              show_state: false
                              tap_action:
                                action: none
                              styles:
                                card:
                                  - background: none
                                  - border: none
                                  - box-shadow: none
                                  - padding: 4px 0 4px
                                grid:
                                  - grid-template-areas: '"t close"'
                                  - grid-template-columns: 1fr auto
                                custom_fields:
                                  t:
                                    - text-align: left
                                    - align-self: center
                                  close:
                                    - justify-self: end
                                    - align-self: center
                              custom_fields:
                                t: |
                                  [[[
                                    return '<div style="font-family:Fraunces,Georgia,serif;font-size:20px;font-weight:400;color:#1F2937">School Checklist</div>';
                                  ]]]
                                close: |
                                  [[[
                                    return '<div onclick="(function(e){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();function f(n){for(var c of n.children||[]){if(c.tagName===\'WA-DIALOG\')return c;var r=f(c)||(c.shadowRoot&&f(c.shadowRoot));if(r)return r;}return null;}var d=f(document);if(d&&d.requestClose)d.requestClose(\'close\');})(event)" '
                                      + 'onmousedown="(function(e){e.stopPropagation();})(event)" '
                                      + 'ontouchstart="(function(e){e.stopPropagation();})(event)" '
                                      + 'style="width:30px;height:30px;border-radius:50%;background:#F3F4F6;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#6B7280;pointer-events:auto;">'
                                      + '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>'
                                      + '</div>';
                                  ]]]
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.school_snack
                              variables:
                                item_name: Snack
                                item_icon: apple
                                item_color: '#4A7C59'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.school_lunch
                              variables:
                                item_name: Lunch
                                item_icon: lunch
                                item_color: '#4A7C59'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.school_water
                              variables:
                                item_name: Water bottle
                                item_icon: water
                                item_color: '#4A7C59'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.school_jacket
                              variables:
                                item_name: Jacket
                                item_icon: jacket
                                item_color: '#4A7C59'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.school_binder
                              variables:
                                item_name: Binder
                                item_icon: notebook
                                item_color: '#4A7C59'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.school_chromebook
                              variables:
                                item_name: Chromebook
                                item_icon: laptop
                                item_color: '#4A7C59'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.school_homework
                              variables:
                                item_name: Homework
                                item_icon: pencil
                                item_color: '#4A7C59'

              # Swimming
              - type: conditional
                conditions:
                  - entity: input_boolean.season_swimming
                    state: "on"
                card:
                  type: custom:button-card
                  template: ct_checklist_card
                  variables:
                    checklist_name: Swimming
                    checklist_icon: waves
                    checklist_color: '#3B82F6'
                    checklist_items: "input_boolean.swimming_bag,input_boolean.swimming_shirt,input_boolean.swimming_trunks,input_boolean.swimming_goggles,input_boolean.swimming_towel,input_boolean.swimming_sunscreen,input_boolean.swimming_wet_bag,input_boolean.swimming_underwear,input_boolean.swimming_shirt_change,input_boolean.swimming_shorts,input_boolean.swimming_water,input_boolean.swimming_snack"
                  tap_action:
                    action: fire-dom-event
                    browser_mod:
                      service: browser_mod.popup
                      data:
                        title: ""
                        size: narrow
                        popup_styles:
                          - style: all
                            styles: |
                              ha-dialog {
                                --ha-dialog-border-radius: 24px;
                              }
                              ha-dialog-header {
                                display: none;
                              }
                        content:
                          type: vertical-stack
                          card_mod:
                            style: |
                              ha-card { border: none !important; box-shadow: none !important; background: none !important; }
                          cards:
                            - type: custom:button-card
                              show_icon: false
                              show_name: false
                              show_state: false
                              tap_action:
                                action: none
                              styles:
                                card:
