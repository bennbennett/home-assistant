                                item_icon: skate
                                item_color: '#4F46E5'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.hockey_6
                              variables:
                                item_name: Chestplate
                                item_icon: chest
                                item_color: '#4F46E5'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.hockey_jersey
                              variables:
                                item_name: Jersey
                                item_icon: shirt
                                item_color: '#4F46E5'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.hockey_7
                              variables:
                                item_name: Water
                                item_icon: water
                                item_color: '#4F46E5'
                            - type: custom:button-card
