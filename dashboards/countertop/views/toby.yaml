                          card_mod:
                            style: |
                              ha-card { border: none !important; box-shadow: none !important; background: none !important; }
                          cards:
                            - type: custom:button-card
                              show_icon: false
                              show_name: false
                              show_state: false
                              tap_action:
                                action: none
                              styles:
                                card:
                                  - background: none
                                  - border: none
                                  - box-shadow: none
                                  - padding: 4px 0 4px
                                grid:
                                  - grid-template-areas: '"t close"'
                                  - grid-template-columns: 1fr auto
                                custom_fields:
                                  t:
                                    - text-align: left
                                    - align-self: center
                                  close:
                                    - justify-self: end
                                    - align-self: center
                              custom_fields:
                                t: |
                                  [[[
                                    return '<div style="font-family:Fraunces,Georgia,serif;font-size:20px;font-weight:400;color:#1F2937">Hockey Checklist</div>';
                                  ]]]
                                close: |
                                  [[[
                                    return '<div onclick="(function(e){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();function f(n){for(var c of n.children||[]){if(c.tagName===\'WA-DIALOG\')return c;var r=f(c)||(c.shadowRoot&&f(c.shadowRoot));if(r)return r;}return null;}var d=f(document);if(d&&d.requestClose)d.requestClose(\'close\');})(event)" '
