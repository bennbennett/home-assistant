                                  - border: none
                                  - box-shadow: none
                                  - padding: 4px 0 4px
                                grid:
                                  - grid-template-areas: '"t close"'
                                  - grid-template-columns: 1fr auto
                                custom_fields:
                                  t:
                                    - text-align: left
                                    - align-self: center
                                  close:
                                    - justify-self: end
                                    - align-self: center
                              custom_fields:
                                t: |
                                  [[[
                                    return '<div style="font-family:Fraunces,Georgia,serif;font-size:20px;font-weight:400;color:#1F2937">Swimming Checklist</div>';
                                  ]]]
                                close: |
                                  [[[
                                    return '<div onclick="(function(e){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();function f(n){for(var c of n.children||[]){if(c.tagName===\'WA-DIALOG\')return c;var r=f(c)||(c.shadowRoot&&f(c.shadowRoot));if(r)return r;}return null;}var d=f(document);if(d&&d.requestClose)d.requestClose(\'close\');})(event)" '
                                      + 'onmousedown="(function(e){e.stopPropagation();})(event)" '
                                      + 'ontouchstart="(function(e){e.stopPropagation();})(event)" '
                                      + 'style="width:30px;height:30px;border-radius:50%;background:#F3F4F6;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#6B7280;pointer-events:auto;">'
                                      + '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>'
                                      + '</div>';
                                  ]]]
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.swimming_bag
                              variables:
                                item_name: Swim bag
                                item_icon: bag
                                item_color: '#3B82F6'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.swimming_shirt
                              variables:
                                item_name: Swim shirt
                                item_icon: shirt
                                item_color: '#3B82F6'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.swimming_trunks
                              variables:
                                item_name: Swim trunks
                                item_icon: swim
                                item_color: '#3B82F6'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.swimming_goggles
                              variables:
                                item_name: Goggles
                                item_icon: goggles
                                item_color: '#3B82F6'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.swimming_towel
                              variables:
                                item_name: Towel
                                item_icon: towel
                                item_color: '#3B82F6'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.swimming_sunscreen
                              variables:
                                item_name: Sunscreen
                                item_icon: sun
                                item_color: '#3B82F6'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.swimming_wet_bag
                              variables:
                                item_name: Wet clothes bag
                                item_icon: droplet
                                item_color: '#3B82F6'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.swimming_underwear
                              variables:
                                item_name: Underwear
                                item_icon: shirt
                                item_color: '#3B82F6'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.swimming_shirt_change
                              variables:
                                item_name: Shirt (change)
                                item_icon: shirt
                                item_color: '#3B82F6'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.swimming_shorts
                              variables:
                                item_name: Shorts
                                item_icon: shorts
                                item_color: '#3B82F6'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.swimming_water
                              variables:
                                item_name: Water bottle
                                item_icon: water
                                item_color: '#3B82F6'
                            - type: custom:button-card
                              template: ct_checklist_item
                              entity: input_boolean.swimming_snack
                              variables:
                                item_name: Snack
                                item_icon: apple
                                item_color: '#3B82F6'

              # Hockey
              - type: conditional
                conditions:
                  - entity: input_boolean.season_hockey
                    state: "on"
                card:
                  type: custom:button-card
                  template: ct_checklist_card
                  variables:
                    checklist_name: Hockey
                    checklist_icon: hockey
                    checklist_color: '#4F46E5'
                    checklist_items: "input_boolean.hockey_1,input_boolean.hockey_2,input_boolean.hockey_3,input_boolean.hockey_4,input_boolean.hockey_5,input_boolean.hockey_6,input_boolean.hockey_jersey,input_boolean.hockey_7,input_boolean.hockey_8"
                  tap_action:
                    action: fire-dom-event
                    browser_mod:
                      service: browser_mod.popup
                      data:
                        title: ""
                        size: narrow
                        popup_styles:
                          - style: all
                            styles: |
                              ha-dialog {
                                --ha-dialog-border-radius: 24px;
                              }
