title: Tasks and Lists
path: tasks
type: panel
cards:
  - type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: 80px 1fr
    cards:
      # Left Menu (side_menu decluttering template)
      - type: custom:decluttering-card
        template: side_menu
        view_layout:
          grid-column: 1
          grid-row: 1

      # Main Content Area
      - type: vertical-stack
        view_layout:
          grid-column: 2
        cards:
          # Single grid with 2 columns
          - type: grid
            columns: 2
            square: false
            cards:
              # ==============
              #  SHOPPING LIST
              # ==============
              - type: vertical-stack

                cards:
                  - type: custom:mushroom-template-card
                    primary: Shopping List
                    secondary: >
                      {{ state_attr('todo.google_keep_shopping_list', 'items') | count }} items
                    icon: mdi:cart
                    icon_color: orange
                    card_mod:
                      style: |
                        ha-card {
                          margin-bottom: -8px
                          background: none;
                          box-shadow: none;
                        }

                  - type: todo-list

                    entity: todo.google_keep_shopping_list
                    hide_completed: true
                    card_mod:
                      style: |
                        ha-card {
                          background: rgb(255, 247, 237);
                          border-radius: 12px;
                        }
                        .add-item {
                          padding: 16px;
                          border-bottom: 1px solid rgba(0,0,0,0.1);
                        }
                        .add-item ha-icon {
                          color: rgb(249, 115, 22);
                        }
                        .items {
                          padding: 8px 16px;
                        }
                        .item ha-checkbox {
                          --mdc-checkbox-unchecked-color rgb(249, 115, 22);
                          --mdc-checkbox-disabled-color: rgb(249, 115, 22);
                        }

              # =========
              #   TASKS
              # =========
              - type: vertical-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: "Family Todo"
                    icon: mdi:checkbox-marked-outline
                    icon_color: blue

                  - type: todo-list
                    entity: todo.google_keep_family_todo
                    hide_completed: true
                    card_mod:
                      style: |
                        ha-card {
                          background: rgb(239, 246, 255);
                          border-radius: 12px;
                          padding: 16px