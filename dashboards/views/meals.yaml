                    - border-radius: 12px
                    - padding: 16px
                    - min-height: 100px
                  name:
                    - font-size: 14px
                    - font-weight: 600
                    - color: white
                    - text-transform: uppercase
                    - letter-spacing: 0.05em
                  state:
                    - font-size: 13px
                    - color: "#9ca3af"
                  icon:
                    - color: "#f87171"
                    - width: 36px

              # Wednesday
