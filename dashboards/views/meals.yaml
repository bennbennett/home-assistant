                show_state: true
                styles:
                  card:
                    - border-radius: 12px
                    - padding: 16px
                    - margin: 4px
                    - background-color: "rgba(167, 139, 250, 0.15)"
                  grid:
                    - grid-template-areas: '"i n" "i s"'
                    - grid-template-columns: min-content 1fr
                  icon:
                    - width: 40px
                    - height: 40px
                    - color: "rgba(167, 139, 250, 0.9)"
                  name:
                    - color: "rgba(167, 139, 250, 0.9)"
                    - font-size: 12px
                    - text-transform: uppercase
                    - margin-left: 12px
                    - justify-self: start
                  state:
                    - font-size: 28px
                    - font-weight: bold
                    - color: "rgba(167, 139, 250, 0.9)"
                    - margin-left: 12px
                    - justify-self: start

              # Categories
              - type: custom:button-card
                name: Categories
                icon: mdi:tag-multiple
