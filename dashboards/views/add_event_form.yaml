title: Add Calendar Event
path: add-event
type: panel
cards:
  - type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: 80px 1fr
      grid-template-rows: 1fr
      margin: 0
      padding: 0
      grid-gap: 0
    cards:
      # Left Menu
      - type: custom:decluttering-card
        template: side_menu
        view_layout:
          grid-column: 1

      # Main Content Area
      - type: vertical-stack
        view_layout:
          grid-column: 2
        card_mod:
          style: |
            :host {
              padding: 16px 8px !important;
              margin: 0 !important;
            }
        cards:
          # Title and Back Button
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                icon: mdi:arrow-left
                name: Back
                tap_action:
                  action: navigate
                  navigation_path: /tablet-dashboard/calendar
                styles:
                  card:
                    - border-radius: 12px
                    - padding: 12px 16px
                    - margin: 4px
                    - width: 140px
                    - background-color: 'rgba(219, 234, 254, 0.5)'
                  grid:
                    - grid-template-areas: '"i n"'
                    - grid-template-columns: min-content 1fr
                  icon:
                    - width: 24px
                    - height: 24px
                    - color: 'rgba(59, 130, 246, 0.6)'
                  name:
                    - color: 'rgba(59, 130, 246, 0.6)'
                    - font-size: 14px
                    - margin-left: 8px

              - type: markdown
                content: |
                  ## Add Calendar Event
                style: |
                  h2 {
                    font-size: 22px;
                    font-weight: 500;
                    margin: 8px 0 0 16px;
                  }

          # Calendar Selection
          - type: entities
            title: Event Details
            entities:
              - entity: input_select.calendar_selection
                name: Calendar
                icon: mdi:calendar
              - entity: input_datetime.event_start_date
                name: Start Date & Time
                icon: mdi:calendar-start
              - entity: input_boolean.event_all_day
                name: All Day Event
                icon: mdi:calendar-clock
              - entity: input_datetime.event_end_date
                name: End Date & Time
                icon: mdi:calendar-end
              - entity: input_text.event_title
                name: Event Title
                icon: mdi:text-short
              - entity: input_text.event_location
                name: Location
                icon: mdi:map-marker
              - entity: input_text.event_description
                name: Description
                icon: mdi:text
              - type: button
                name: Create Event
                icon: mdi:calendar-plus
                tap_action:
                  action: call-service
                  service: script.create_calendar_event
                style:
                  button:
                    background-color: rgb(59, 130, 246)
                    color: white
                    font-weight: 500
                    border-radius: 8px
                    padding: 10px
                    width: 100%
