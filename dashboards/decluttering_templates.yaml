side_menu:
  card:
    type: vertical-stack
    card_mod:
      style: |
        ha-card {
          height: calc(100vh);
          width: 100px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 32px;  # Increased from 16px
          padding: 48px 0;  # Increased from 24px
          background: rgba(255, 255, 255, 0.8);
          backdrop-filter: blur(8px);
          margin: 0;
          border-right: 1px solid rgba(0, 0, 0, 0.1);
        }
    cards:
      # --- Button #1: Calendar ---
      - type: custom:button-card
        icon: mdi:calendar-month
        tap_action:
          action: navigate
          navigation_path: /tablet-dashboard/calendar
        styles:
          card:
            - width: 60px
            - height: 60px
            - border-radius: 12px
            - padding: 0px
            - margin: 8px
            - padding: 0px
            - background-color: >
                [[[ return window.location.pathname.endsWith('/tablet-dashboard/calendar')
                    ? 'rgb(219, 234, 254)'
                    : 'rgba(219, 234, 254, 0.5)' ]]]
            - box-shadow: >
                [[[ return window.location.pathname.endsWith('/tablet-dashboard/calendar')
                    ? '0 4px 6px -1px rgba(59, 130, 246, 0.1), 0 2px 4px -1px rgba(59, 130, 246, 0.06)'
                    : 'none'
                ]]]
            - "&:before":
                - content: "''"
                - position: absolute
                - left: -8px
                - height: 24px
                - width: 3px
                - background-color: rgb(59, 130, 246)
                - border-radius: 0 4px 4px 0
                - opacity: >
                    [[[
                      if(window.location.pathname.endsWith('/tablet-dashboard/calendar')) return '1';
                      return '0';
                    ]]]
          icon:
            - width: 30px
            - height: 30px
            - color: >
                [[[ return window.location.pathname.endsWith('/tablet-dashboard/calendar')
                    ? 'rgb(59, 130, 246)'
                    : 'rgba(59, 130, 246, 0.6)' 
                ]]]
