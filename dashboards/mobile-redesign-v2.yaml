                    data:
                      title: Ben's iPad
                      content:
                        type: vertical-stack
                        cards:
                          - type: custom:mushroom-title-card
                            title: Ben's iPad
                            subtitle: "{{ states('sensor.benjamins_ipad_battery_level') }}% battery"
                          - type: custom:mushroom-template-card
                            primary: Battery
                            secondary: "{{ states('sensor.benjamins_ipad_battery_level') }}%"
                            icon: mdi:battery
                            icon_color: |
                              {% set level = states('sensor.benjamins_ipad_battery_level') | int %}
                              {% if level <= 20 %}red{% elif level <= 50 %}orange{% else %}green{% endif %}

              - type: custom:button-card
