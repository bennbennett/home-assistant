                  margin: 0;
                  color: #374151;
                }

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                name: Roomba
                icon: mdi:robot-vacuum
                entity: vacuum.roomba_mcroomba
                template: mobile_device_card
                variables:
                  accent_color: '#22c55e'
                  battery_entity: sensor.roomba_mcroomba_battery
                tap_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      title: Roomba
                      content:
                        type: vertical-stack
                        cards:
                          - type: custom:mushroom-title-card
                            title: McRoomba
                            subtitle: "{{ states('vacuum.roomba_mcroomba') | title }}"
                          - type: custom:mushroom-template-card
                            primary: Battery
                            secondary: "{{ states('sensor.roomba_mcroomba_battery') }}%"
                            icon: mdi:battery
                            icon_color: |
                              {% set level = states('sensor.roomba_mcroomba_battery') | int %}
                              {% if level <= 20 %}red{% elif level <= 50 %}orange{% else %}green{% endif %}
                          - type: custom:mushroom-template-card
                            primary: Status
                            secondary: "{{ states('vacuum.roomba_mcroomba') | title }}"
                            icon: mdi:robot-vacuum
                            icon_color: "{{ 'green' if is_state('vacuum.roomba_mcroomba', 'cleaning') else 'grey' }}"
                          - type: horizontal-stack
                            cards:
                              - type: custom:mushroom-template-card
                                primary: Start
                                icon: mdi:play
                                icon_color: green
                                tap_action:
                                  action: call-service
                                  service: vacuum.start
                                  target:
                                    entity_id: vacuum.roomba_mcroomba
                              - type: custom:mushroom-template-card
                                primary: Dock
                                icon: mdi:home
                                icon_color: blue
