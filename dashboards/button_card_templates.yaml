    style: |-
      ha-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 24px;
        margin: 16px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        max-width: 800px;
        width: 90vw;
        position: fixed;
        z-index: 999;
      }
  styles:
    card:
      - background: rgba(255, 255, 255, 0.95)
      - backdrop-filter: blur(10px)
    name:
      - font-size: 24px
      - font-weight: 500
      - margin-bottom: 16px

# Template for a light control section
light_control_section:
  show_name: true
  show_icon: true
  styles:
    card:
      - border-radius: 12px
      - padding: 16px
      - background: rgba(0, 0, 0, 0.04)
    grid:
      - grid-template-areas: '"i n s"'
      - grid-template-columns: min-content auto max-content
    name:
      - justify-self: start
      - font-weight: 400
    icon:
      - width: 24px
      - color: var(--primary-color)
    state:
      - justify-self: end
      - font-size: 14px

# Template for temperature display
temp_display_section:
  show_name: true
  show_state: true
  styles:
    card:
      - border-radius: 12px
      - padding: 16px
      - background: rgba(0, 0, 0, 0.04)
    grid:
      - grid-template-areas: '"i n s"'
      - grid-template-columns: min-content auto max-content
    name:
      - justify-self: start
      - font-weight: 400
    state:
      - font-size: 20px
      - color: var(--primary-color)

variables:
  status_map:
    light: '[[[ return variables.light_entity ? states[variables.light_entity].state === "on" : false ]]]'
    temp: "[[[ return states[entity].state > 70 ]]]"
    motion: '[[[ return variables.motion_entity ? states[variables.motion_entity].state === "on" : false ]]]'

custom_fields:
  status: |-
    [[[
      const getStatusColor = (type) => {
        const colors = {
          light: '#22c55e',
          temp: '#3b82f6', 
          motion: '#f59e0b'
        };
        const opacity = variables.status_map[type] ? '1' : '0.3';
        const color = colors[type];
        return `
          <div style="
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: ${color}15;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 4px;"
          >
            <div style="
              width: 12px;
              height: 12px;
              border-radius: 50%;
              background: ${color};
              opacity: ${opacity};"
            ></div>
          </div>
        `;
      };
      return `
        ${getStatusColor('light')}
        ${getStatusColor('temp')}
        ${getStatusColor('motion')}
      `;
    ]]]

quick_action:
  show_icon: true
  show_name: true
  show_state: false
  styles:
    card:
      - border-radius: 12px
      - padding: 12px
      - height: 80px
      - box-shadow: var(--ha-card-box-shadow, 0px 2px 4px 0px rgba(0,0,0,0.12))
    grid:
      - grid-template-areas: '"i" "n"'
      - grid-template-columns: 1fr
      - grid-template-rows: 1fr auto
    icon:
      - width: 32px
      - height: 32px
      - color: var(--primary-color)
    name:
      - font-size: 14px
      - font-weight: 500
      - margin-top: 8px
      - justify-self: center
  state:
    - value: "on"
      styles:
        card:
          - background-color: "rgba(var(--rgb-primary-color), 0.2)"
        icon:
          - color: var(--primary-color)
    - value: "off"
      styles:
        card:
          - background-color: var(--card-background-color)
        icon:
          - color: var(--secondary-text-color)

heading:
  show_icon: false
  show_name: true
  show_state: false
  styles:
    card:
      - box-shadow: none
      - padding: 8px 0px
      - background: none
      - border-radius: 0
    name:
      - font-size: 20px
      - font-weight: 500
      - color: var(--primary-text-color)
      - padding-left: 8px
      - border-left: 3px solid var(--primary-color)

# Mobile-optimized room card
mobile_room_card:
  show_icon: true
  show_name: true
  show_state: true
  
  styles:
    card:
      - border-radius: 12px
      - padding: 16px
      - position: relative
      - height: 120px
    grid:
      - grid-template-areas: '"n n" "s s" "i i"'
      - grid-template-columns: 1fr auto
      - grid-template-rows: auto auto 1fr
    name:
      - font-size: 18px
      - font-weight: 500
      - padding-bottom: 4px
      - justify-self: start
      - opacity: 0.9
    state:
      - font-size: 14px
      - color: var(--secondary-text-color)
      - justify-self: start
      - margin-bottom: 8px
    icon:
      - width: 40px
      - height: 40px
      - color: "[[[ return variables.color ]]]"
      - z-index: 2
      - align-self: end
      - justify-self: start
      - margin-left: 0px
      - margin-bottom: 0px
    custom_fields:
      circle:
        - position: absolute
        - right: -20px
        - bottom: -20px
        - width: 100px
        - height: 100px
        - background-color: '[[[ return variables.color + "15" ]]]'
        - z-index: 1
        - border-radius: 50%
      status:
        - position: absolute
        - top: 16px
        - right: 16px
        - display: flex
        - flex-direction: row
        - gap: 8px

  # Simplified popup for mobile
  tap_action:
    action: fire-dom-event
    browser_mod:
      command: popup
      title: "{{ name }}"
      card:
        type: vertical-stack
        cards:
          # Temperature Display
          - type: custom:mushroom-template-card
            primary: Temperature
            secondary: "{{ states(entity) }}°F"
            icon: mdi:thermometer
            icon_color: blue
            card_mod:
              style: |-
                ha-card {
                  background: rgb(239, 246, 255);
                  margin-bottom: 12px;
                }
          # Light Controls
          - type: custom:mushroom-light-card
            entity: "[[[ return variables.light_entity ]]]"
            name: Main Light
            icon: mdi:ceiling-light
            show_brightness_control: true
            use_light_color: true
            card_mod:
              style: |-
                ha-card {
                  background: rgb(249, 250, 251);
                }

  custom_fields:
    circle: " "
    status: |-
      [[[
        // Simplified status indicators for mobile
        const renderIndicator = (icon, color) => {
          return `
            <div style="
              width: 24px;
              height: 24px;
              border-radius: 50%;
              background: ${color}15;
              display: flex;
              align-items: center;
              justify-content: center;
              margin: 2px;"
            >
              <ha-icon
                icon="${icon}"
                style="
                  --mdc-icon-size: 14px;
                  color: ${color};"
              ></ha-icon>
            </div>
          `;
        };

        const indicators = [];
        
        // Light indicator
        if (variables.light_entity) {
          const root = document.querySelector('home-assistant');
          const isOn = root && root.hass && root.hass.states[variables.light_entity]?.state === 'on';
          indicators.push(renderIndicator('mdi:lightbulb', isOn ? '#FF9002' : '#94a3b8'));
        }
        
        // Temperature indicator
        if (variables.temp_entity || entity) {
          const tEntity = variables.temp_entity || entity;
          const root = document.querySelector('home-assistant');
          const temp = root && root.hass ? parseFloat(root.hass.states[tEntity]?.state || '0') : 0;
          
          let color = '#3b82f6'; // default blue
          if (temp < 65) {
            color = '#3b82f6'; // blue
          } else if (temp < 75) {
            color = '#f59e0b'; // orange
          } else {
            color = '#ef4444'; // red
          }
          
          indicators.push(renderIndicator('mdi:thermometer', color));
        }
        
        return indicators.join('');
      ]]]

