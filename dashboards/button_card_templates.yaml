# Mobile top navigation template
mobile_top_nav:
  color: var(--primary-text-color)
  show_icon: true
  show_name: true
  styles:
    card:
      - height: 60px
      - border-radius: 15px
      - padding: 5px
      - background-color: "[[[ 
          const path = variables.current_view || 'home';
          const currentPath = window.location.pathname;
          const hash = window.location.hash.substring(1);
          
          const isActive = 
            (currentPath.includes('/mobile-dashboard') && hash === path) || 
            (currentPath.includes('/mobile-dashboard') && hash === '' && path === 'home') ||
            (currentPath.includes('/lovelace/mobile-dashboard') && hash === path) ||
            (currentPath.includes('/lovelace/mobile-dashboard') && hash === '' && path === 'home');
          
          const viewColors = {
            'home': 'rgba(var(--rgb-primary-color), 0.9)',
            'calendar': 'rgba(var(--rgb-accent-color), 0.9)',
            'devices': 'rgba(var(--rgb-green), 0.9)'
          };
          
          return isActive ? viewColors[path] || viewColors['home'] : 'rgba(var(--rgb-card-background), 0.7)';
        ]]]"
    icon:
      - color: "[[[ 
          const path = variables.current_view || 'home';
          const currentPath = window.location.pathname;
          const hash = window.location.hash.substring(1);
          
          const isActive = 
            (currentPath.includes('/mobile-dashboard') && hash === path) || 
            (currentPath.includes('/mobile-dashboard') && hash === '' && path === 'home') ||
            (currentPath.includes('/lovelace/mobile-dashboard') && hash === path) ||
            (currentPath.includes('/lovelace/mobile-dashboard') && hash === '' && path === 'home');
          
          return isActive ? 'rgba(var(--rgb-white), 1)' : 'rgba(var(--rgb-primary-text-color), 0.6)';
        ]]]"
    name:
      - color: "[[[ 
          const path = variables.current_view || 'home';
          const currentPath = window.location.pathname;
          const hash = window.location.hash.substring(1);
          
          const isActive = 
            (currentPath.includes('/mobile-dashboard') && hash === path) || 
            (currentPath.includes('/mobile-dashboard') && hash === '' && path === 'home') ||
            (currentPath.includes('/lovelace/mobile-dashboard') && hash === path) ||
            (currentPath.includes('/lovelace/mobile-dashboard') && hash === '' && path === 'home');
          
          return isActive ? 'rgba(var(--rgb-white), 1)' : 'rgba(var(--rgb-primary-text-color), 0.6)';
        ]]]"
  tap_action:
    action: navigate
    navigation_path: "[[[ 
        const path = variables.current_view || 'home';
        return `/dashboards/mobile-dashboard/${path}`;
      ]]]"
